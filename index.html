<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"/>
<title>Our Universe ✦</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,100..1000&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;width:100%;overflow:hidden}
body{font-family:'Roboto Flex',system-ui,sans-serif;background:#0e0e0e;color:#fff}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(circle at 20% 30%,rgba(215,253,90,0.05) 0%,transparent 50%),radial-gradient(circle at 80% 70%,rgba(99,92,255,0.05) 0%,transparent 50%);pointer-events:none;z-index:0}
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;font-family:'Material Symbols Outlined'}
svg path,svg circle,svg rect,svg polyline,svg line{fill:none}
#app{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;z-index:1}
.stars{position:absolute;inset:0;pointer-events:none;z-index:0}
.star{position:absolute;background:#fff;border-radius:50%}
.screen{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.page{display:none;flex-direction:column;flex:1;overflow:hidden;min-height:0}
.page.active{display:flex}
@keyframes modal-pop{0%{opacity:0;transform:scale(0.9) translateY(20px)}100%{opacity:1;transform:scale(1) translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* NAV */
.nav{flex-shrink:0;margin:0 16px;margin-bottom:max(16px,env(safe-area-inset-bottom));background:rgba(44,44,44,0.8);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border-radius:100px;border:1px solid rgba(255,255,255,0.1);box-shadow:0 20px 50px rgba(0,0,0,0.5);display:flex;justify-content:space-between;align-items:center;padding:16px 24px;z-index:50}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;background:transparent;border:none;cursor:pointer;color:rgba(119,117,117,1);font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:0.1em;font-family:'Roboto Flex',sans-serif;transition:color 0.18s;padding:4px 0}
.nav-btn .material-symbols-outlined{font-size:24px;transition:all 0.18s}
.nav-btn.active{color:#d7fd5a}
.nav-btn.active .material-symbols-outlined{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24}

/* SCROLL */
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 16px 20px;scrollbar-width:none}
.scroll-area::-webkit-scrollbar{display:none}

/* HEADER */
.home-header{padding:max(48px,calc(44px + env(safe-area-inset-top))) 24px 16px;display:flex;align-items:center;justify-content:space-between}
.couple-avatars{display:flex;margin-right:4px}
.avatar-wrap{width:48px;height:48px;border-radius:50%;padding:2px;display:flex;align-items:center;justify-content:center}
.avatar-wrap:nth-child(1){border:2px solid #d7fd5a;box-shadow:0 0 20px rgba(215,253,90,0.2);margin-right:-8px;z-index:2}
.avatar-wrap:nth-child(2){border:2px solid #635cff;z-index:1}
.avatar-inner{width:100%;height:100%;border-radius:50%}
.avatar-wrap:nth-child(1) .avatar-inner{background:linear-gradient(135deg,#d7fd5a,#635cff)}
.avatar-wrap:nth-child(2) .avatar-inner{background:linear-gradient(135deg,#635cff,#d7fd5a)}
.couple-name-row{display:flex;align-items:center;gap:8px;cursor:pointer;flex:1;margin-left:12px}
.couple-name{font-size:24px;font-weight:900;color:#fff;letter-spacing:-0.02em}
.edit-name-btn{background:none;border:none;cursor:pointer;color:rgba(119,117,117,1);font-size:14px;display:flex;align-items:center;transition:color 0.15s}
.edit-name-btn:hover{color:#d7fd5a}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#d7fd5a;display:inline-block;margin-left:4px;animation:pulse 2s infinite}
.sync-dot.off{background:#ff6e84;animation:none}

/* WIDGETS */
.widget{border-radius:40px;margin-bottom:16px;overflow:hidden;position:relative;background:rgba(26,25,25,0.6);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.08)}
.widget-bucket{background:linear-gradient(135deg,rgba(99,92,255,0.08) 0%,rgba(255,106,220,0.05) 100%)}
.widget-memory{background:linear-gradient(135deg,rgba(255,106,220,0.08) 0%,rgba(215,253,90,0.05) 100%)}
.widget-header{padding:32px 32px 0;display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:40px}
.widget-title{font-size:28px;font-weight:900;color:#fff;line-height:1.1;letter-spacing:-0.02em}
.widget-arrow{width:48px;height:48px;border-radius:50%;background:rgba(38,38,38,1);border:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;color:#d7fd5a;cursor:pointer;border:none;flex-shrink:0;transition:all 0.15s;box-shadow:0 4px 16px rgba(0,0,0,0.3)}
.widget-arrow:hover{background:#d7fd5a;color:#0e0e0e}
.widget-list{padding:0 32px 32px;display:flex;flex-direction:column;gap:16px}
.widget-item{display:flex;align-items:center;gap:20px;padding:20px 24px;background:rgba(32,31,31,0.4);border-radius:100px;border:1px solid rgba(255,255,255,0.05);backdrop-filter:blur(10px);transition:background 0.15s}
.widget-item:hover{background:rgba(99,92,255,0.1)}
.widget-check{width:40px;height:40px;border-radius:50%;border:2px solid #d7fd5a;flex-shrink:0}
.widget-check.purple{border-color:#635cff}
.widget-item-text{font-size:16px;font-weight:700;color:rgba(173,170,170,1)}
.widget-empty{font-size:14px;color:rgba(255,255,255,0.25);font-weight:600;padding:20px 0;text-align:center}
.mem-preview-img{width:calc(100% - 64px);margin:0 32px;border-radius:32px;aspect-ratio:16/9;overflow:hidden;border:1px solid rgba(255,255,255,0.1)}
.mem-preview-img img{width:100%;height:100%;object-fit:cover;transition:transform 1s}
.mem-preview-img:hover img{transform:scale(1.1)}
.mem-info-bar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:rgba(32,31,31,0.4);border-radius:100px;border:1px solid rgba(255,255,255,0.05);margin:20px 32px 32px;backdrop-filter:blur(10px)}
.mem-info-left{display:flex;align-items:center;gap:16px}
.mem-info-icon{color:#d7fd5a;font-size:24px}
.mem-info-title{font-size:17px;font-weight:900;color:#fff;letter-spacing:0.02em}
.mem-info-date{font-size:11px;font-weight:900;color:rgba(173,170,170,0.6);text-transform:uppercase;letter-spacing:0.1em}

/* FOR YOU board */
.for-you-board{border-radius:40px;margin-bottom:16px;overflow:hidden;position:relative;min-height:500px;display:flex;flex-direction:column;background:linear-gradient(135deg,rgba(215,253,90,0.08) 0%,rgba(99,92,255,0.08) 100%);border:1px solid rgba(255,255,255,0.1)}
.board-glow{position:absolute;top:-40px;right:-40px;width:160px;height:160px;background:rgba(99,92,255,0.15);border-radius:50%;filter:blur(60px);pointer-events:none;z-index:0}
.board-header{position:relative;z-index:3;padding:24px 24px 0;display:flex;justify-content:space-between;align-items:flex-start}
.board-title{font-size:32px;font-weight:900;color:rgba(255,255,255,0.15);line-height:1;letter-spacing:-0.02em;text-transform:uppercase;pointer-events:none}
.board-controls{display:flex;flex-direction:column;align-items:flex-end;gap:10px}
.board-clear{padding:6px 16px;border-radius:100px;background:rgba(38,38,38,0.8);border:1px solid rgba(255,255,255,0.05);color:rgba(255,255,255,0.5);font-size:11px;font-weight:900;cursor:pointer;text-transform:uppercase;letter-spacing:0.1em;font-family:'Roboto Flex',sans-serif}
.board-undo{width:40px;height:40px;border-radius:50%;background:rgba(32,31,31,0.9);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.6);cursor:pointer;display:flex;align-items:center;justify-content:center}
.board-spacer{flex:1;min-height:180px}
.trash-bin{width:40px;height:40px;border-radius:50%;background:rgba(26,25,25,0.6);border:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.4);margin:0 auto 4px;opacity:0;transform:scale(0.8);transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);pointer-events:none;position:relative;z-index:10}
.color-bar{display:flex;align-items:center;gap:10px;background:rgba(44,44,44,0.9);backdrop-filter:blur(20px);padding:10px 20px;border-radius:100px;border:1px solid rgba(255,255,255,0.1);margin:0 auto 12px;position:relative;z-index:10}
.color-dot{width:24px;height:24px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:all 0.15s;flex-shrink:0}
.color-dot.active-dot{border-color:#fff;transform:scale(1.2)}
.board-toolbar{display:flex;align-items:center;background:rgba(44,44,44,0.8);backdrop-filter:blur(20px);padding:12px 24px;border-radius:100px;border:1px solid rgba(255,255,255,0.1);gap:24px;margin:0 auto 24px;position:relative;z-index:10}
.tool-btn{width:48px;height:48px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.tool-btn.active-tool{background:#d7fd5a;color:#0e0e0e}
.tool-btn.inactive-tool{background:rgba(215,253,90,0.1);color:#d7fd5a}
.tool-btn:active{transform:scale(0.92)}

/* LIST PAGE */
.page-header{padding:max(52px,calc(44px + env(safe-area-inset-top))) 24px 8px;background:#0e0e0e;flex-shrink:0}
.page-title{font-size:42px;font-weight:900;color:#fff;line-height:1;letter-spacing:-0.03em;text-transform:uppercase;margin-bottom:16px}
.page-title span{color:#d7fd5a}
.page-sub{font-size:11px;font-weight:700;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:4px}
.cats-sticky{padding:8px 24px 12px;background:#0e0e0e;flex-shrink:0}
.cats{display:flex;gap:12px;overflow-x:auto;scrollbar-width:none}
.cats::-webkit-scrollbar{display:none}
.cat{flex-shrink:0;height:38px;padding:0 20px;border-radius:100px;font-size:13px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:0.06em;outline:none;border:none;display:inline-flex;align-items:center;transition:all 0.15s}
.cat.inactive{background:rgba(32,31,31,1);color:rgba(173,170,170,1)}
.cat.inactive:hover{background:rgba(38,38,38,1)}
.cat.active{color:#0e0e0e;box-shadow:0 0 20px rgba(215,253,90,0.2)}
.add-btn{width:100%;padding:18px 24px;background:#d7fd5a;border-radius:100px;border:none;display:flex;align-items:center;justify-content:center;gap:10px;cursor:pointer;margin-bottom:24px;margin-top:4px;transition:all 0.15s;box-shadow:0 10px 30px rgba(215,253,90,0.3)}
.add-btn:active{transform:scale(0.97);box-shadow:0 5px 15px rgba(215,253,90,0.2)}
.add-btn .material-symbols-outlined{font-size:24px;color:#0e0e0e;font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24}
.add-label{font-size:16px;font-weight:900;color:#0e0e0e;text-transform:uppercase;letter-spacing:0.06em}
.section-head{display:flex;align-items:center;gap:16px;margin-bottom:16px}
.section-head-title{font-size:22px;font-weight:700;color:#fff;letter-spacing:-0.01em;white-space:nowrap}
.section-head-title.done-title{opacity:0.6}
.section-divider{height:2px;flex:1;background:linear-gradient(to right,rgba(73,72,71,0.4),transparent)}
.section-label{font-size:11px;font-weight:800;color:rgba(255,255,255,0.25);text-transform:uppercase;letter-spacing:0.1em;margin:16px 0 8px}
.item-wrap{position:relative;margin-bottom:8px}
.item{width:100%;padding:20px 20px;border-radius:16px;border:none;border-left:4px solid transparent;display:flex;align-items:center;gap:16px;text-align:left;background:rgba(19,19,19,1);cursor:default;user-select:none;transition:all 0.15s}
.item:hover{background:rgba(26,25,25,1);border-left-color:#d7fd5a}
.item.done{background:rgba(38,38,38,0.2);opacity:0.7;border-left:4px solid transparent}
.item.pressing{transform:scale(0.98);opacity:0.7}
.checkbox{width:32px;height:32px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border:1px solid rgba(73,72,71,1);background:rgba(38,38,38,1);cursor:pointer;transition:all 0.15s}
.checkbox:hover{border-color:#d7fd5a}
.checkbox.checked{border:none;background:rgba(99,92,255,0.2)}
.checkbox .material-symbols-outlined{font-size:18px;color:#9492ff;font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24}
.item-body{flex:1;min-width:0}
.item-text{font-size:17px;font-weight:700;letter-spacing:0.02em;color:#fff;text-transform:uppercase;margin-bottom:4px}
.item-text.done-text{color:rgba(173,170,170,1);text-decoration:line-through}
.item-badges{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.item-badge{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:0.1em;padding:2px 8px;border-radius:4px}
.item-cat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.item-drag{font-size:20px;color:rgba(73,72,71,1);opacity:0;transition:opacity 0.15s;flex-shrink:0}
.item:hover .item-drag{opacity:1}
.delete-menu{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:rgba(32,31,31,0.95);border-radius:16px;border:1px solid rgba(255,255,255,0.08);padding:6px;display:flex;gap:6px;z-index:100;white-space:nowrap;backdrop-filter:blur(20px)}
.del-btn{padding:10px 18px;border-radius:100px;font-size:12px;font-weight:900;text-transform:uppercase;cursor:pointer;border:none}
.del-btn.confirm{background:#ff6e84;color:#fff}
.del-btn.cancel-del{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.6)}
.delete-menu::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:rgba(32,31,31,0.95)}

/* MEMORY PAGE */
.card-stack{position:relative;width:100%;height:380px}
.polaroid{position:absolute;width:270px;left:50%;background:#f5f0e8;border-radius:20px;padding:12px 12px 44px;cursor:pointer;user-select:none;touch-action:none}
.polaroid:nth-child(1){transform:translateX(-50%) rotate(-4deg);z-index:1;top:20px}
.polaroid:nth-child(2){transform:translateX(-46%) rotate(3deg);z-index:2;top:10px}
.polaroid:nth-child(3){transform:translateX(-54%) rotate(-1.5deg);z-index:3;top:0}
.polaroid-img{width:100%;aspect-ratio:1;border-radius:10px;background:#d8d0c0;display:flex;align-items:center;justify-content:center;font-size:44px;margin-bottom:10px;overflow:hidden}
.polaroid-img img{width:100%;height:100%;object-fit:cover}
.polaroid-title{font-size:14px;font-weight:900;color:#1a1208;text-transform:uppercase;margin-bottom:2px}
.polaroid-date{font-size:11px;color:#7a6a50;font-weight:600}
.polaroid-cat{position:absolute;bottom:12px;right:12px;font-size:10px;font-weight:800;text-transform:uppercase;padding:3px 8px;border-radius:20px;color:#0e0e0e}
.stack-hint{font-size:11px;font-weight:800;color:rgba(255,255,255,0.2);text-transform:uppercase;letter-spacing:0.08em;text-align:center;margin-top:16px}
.grid-view{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid-card{background:rgba(26,25,25,0.6);border-radius:24px;overflow:hidden;cursor:pointer;position:relative;user-select:none;border:1px solid rgba(255,255,255,0.08)}
.grid-img{width:100%;aspect-ratio:1;background:#1e1e35;display:flex;align-items:center;justify-content:center;font-size:30px;overflow:hidden}
.grid-img img{width:100%;height:100%;object-fit:cover}
.grid-body{padding:10px 12px 12px}
.grid-title{font-size:12px;font-weight:800;color:#fff;text-transform:uppercase;margin-bottom:3px}
.grid-date{font-size:10px;color:rgba(255,255,255,0.3);font-weight:600}
.mode-toggle{background:rgba(38,38,38,1);border:1px solid rgba(255,255,255,0.1);border-radius:100px;font-size:11px;font-weight:800;color:rgba(255,255,255,0.6);cursor:pointer;text-transform:uppercase;letter-spacing:0.05em;white-space:nowrap;height:36px;padding:0 16px;display:flex;align-items:center}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 0;color:rgba(255,255,255,0.2)}
.empty-ic{font-size:36px;margin-bottom:10px}
.empty-tx{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:0.06em}

/* MODALS */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(12px)}
.modal-sheet{border-radius:32px;width:100%;max-width:400px;padding:28px;position:relative;background:rgba(26,25,25,0.95);border:1px solid rgba(255,255,255,0.1);animation:modal-pop 0.3s cubic-bezier(0.34,1.56,0.64,1)}
.modal-close{position:absolute;top:16px;right:16px;width:32px;height:32px;background:rgba(255,255,255,0.08);border:none;border-radius:50%;color:rgba(255,255,255,0.7);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-title{font-size:20px;font-weight:900;color:#fff;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:20px;text-align:center}
.modal-label{font-size:11px;font-weight:800;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px}
.modal-item-name{font-size:15px;font-weight:900;color:#fff;text-transform:uppercase;margin-bottom:14px}
.m3-input{width:100%;padding:14px 18px;background:rgba(0,0,0,0.4);border:none;border-radius:100px;font-size:14px;font-weight:700;color:#fff;margin-bottom:12px;outline:none;font-family:'Roboto Flex',sans-serif}
.m3-input:focus{box-shadow:0 0 0 2px rgba(215,253,90,0.4)}
.m3-input::placeholder{color:rgba(255,255,255,0.25)}
.cat-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.cpick{padding:0 16px;height:34px;border-radius:100px;font-size:12px;font-weight:800;text-transform:uppercase;cursor:pointer;color:#0e0e0e;border:2.5px solid transparent;display:inline-flex;align-items:center}
.cpick.sel{border-color:#fff}
.photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.photo-slot{aspect-ratio:1;border-radius:20px;background:rgba(255,255,255,0.05);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;overflow:hidden}
.photo-slot img{width:100%;height:100%;object-fit:cover}
.plus-ic{font-size:28px;font-weight:900;color:rgba(255,255,255,0.3)}
.modal-btns{display:flex;gap:8px;margin-top:8px}
.btn-filled{flex:1;padding:15px;background:#d7fd5a;border:none;border-radius:100px;font-size:13px;font-weight:900;color:#0e0e0e;text-transform:uppercase;letter-spacing:0.05em;cursor:pointer}
.btn-filled.pink{background:linear-gradient(135deg,#ff6adc,#e840c0)}
.btn-outlined{flex:1;padding:14px;background:transparent;border:1.5px solid rgba(255,255,255,0.15);border-radius:100px;font-size:13px;font-weight:900;color:#fff;text-transform:uppercase;letter-spacing:0.05em;cursor:pointer}
.drag-handle{width:36px;height:4px;background:rgba(255,255,255,0.12);border-radius:2px;margin:0 auto 18px}
.mem-cat-badge{font-size:10px;font-weight:800;text-transform:uppercase;padding:3px 10px;border-radius:20px;color:#0e0e0e;display:inline-block;margin-bottom:8px}
.mem-note{font-size:13px;color:rgba(255,255,255,0.5);line-height:1.6;font-weight:600;margin-top:12px}
.mem-photos{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
.mem-photo{aspect-ratio:1;border-radius:14px;background:rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:center;font-size:28px;overflow:hidden}
.mem-photo img{width:100%;height:100%;object-fit:cover}
.del-confirm-overlay{position:absolute;inset:0;background:rgba(10,10,10,0.88);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;border-radius:24px;z-index:10}
.del-confirm-title{font-size:12px;font-weight:900;color:#fff;text-transform:uppercase}
.del-confirm-btns{display:flex;gap:8px}

/* LOGIN */
.login-screen{position:fixed;inset:0;background:#0e0e0e;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 32px}
.login-stars{position:absolute;inset:0;pointer-events:none}
.login-content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;text-align:center;width:100%;max-width:320px}
.login-title{font-size:36px;font-weight:900;color:#fff;letter-spacing:-0.02em;line-height:1.1;margin-bottom:8px}
.login-title span{color:#d7fd5a}

});

var CHIP_ACTIVE={All:{bg:'#d7fd5a',text:'#0e0e0e'},Travel:{bg:'#5ee7ff',text:'#0e0e0e'},Food:{bg:'#ff9f4a',text:'#0e0e0e'},Fun:{bg:'#ff6eb4',text:'#0e0e0e'},Romance:{bg:'#bf94ff',text:'#0e0e0e'},Adventure:{bg:'#d7fd5a',text:'#0e0e0e'},Other:{bg:'#ff5c5c',text:'#0e0e0e'}};
var CATS=['All','Travel','Food','Fun','Romance','Adventure'];
var items=[],homeCat='All',memCat='All',memMode='card',newCat='Adventure',tempPhotos=[],openDeleteId=null,holdTimer=null,curPage='home';

function switchPage(p){
  curPage=p;
  var pageMap={home:'page-home',list:'page-list',memory:'page-memory'};
  var navMap={home:'nav-home',list:'nav-list',memory:'nav-mem'};

    document.getElementById(pageMap[k]).classList.toggle('active',k===p);
    document.getElementById(navMap[k]).classList.toggle('active',k===p);
  });
  openDeleteId=null;
  renderCurrentPage();
}

function renderCurrentPage(){
  if(curPage==='home')renderHome();

// HOME RENDER
function renderHome(){
  var todo=items.filter(function(x){return !x.done;});
  var done=items.filter(function(x){return x.done;});
  var wl=document.getElementById('widget-todo-list');
  if(todo.length===0){
    wl.innerHTML='<div class="widget-empty">No ideas yet — add one! ✦</div>';
  } else {
    wl.innerHTML=todo.slice(0,3).map(function(item,idx){
      var c=CC[item.cat]||'#fff';
      return '<div class="widget-item"><div class="widget-check'+(idx===1?' purple':'')+'" style="border-color:'+c+'"></div><div class="widget-item-text">'+item.title+'</div></div>';
    }).join('')+(todo.length>3?'<div class="widget-empty">+'+(todo.length-3)+' more</div>':'');
  }
  var mp=document.getElementById('widget-mem-preview');
  var memories=done.filter(function(x){return x.done;});
  if(memories.length===0){
    mp.innerHTML='<div class="widget-empty" style="padding:20px">No memories yet ✦</div>';
  } else {
    var latest=memories[memories.length-1];
    var c=CC[latest.cat]||'#d7fd5a';
    var imgHtml=latest.photos&&latest.photos[0]
      ?'<img src="'+latest.photos[0]+'" style="width:100%;height:100%;object-fit:cover"/>'
      :'<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:48px">'+memEmoji(latest.cat)+'</div>';
    mp.innerHTML='<div class="mem-preview-img">'+imgHtml+'</div>'
      +'<div class="mem-info-bar">'
      +'<div class="mem-info-left"><span class="material-symbols-outlined mem-info-icon">restaurant</span><span class="mem-info-title">'+(latest.title||'')+'</span></div>'
      +'<span class="mem-info-date">'+(latest.date||'')+'</span>'
      +'</div>';
  }
}

// CHIPS
function chipHTML(c,active){
  if(active){var col=CHIP_ACTIVE[c]||{bg:'#d7fd5a',text:'#0e0e0e'};return '<button class="cat active" style="background:'+col.bg+';color:'+col.text+'" data-cat="'+c+'">'+c+'</button>';}
  return '<button class="cat inactive" data-cat="'+c+'">'+c+'</button>';
}
function bindCats(id,fn){
  var el=document.getElementById(id);if(!el)return;
  el.querySelectorAll('[data-cat]').forEach(function(b){b.onclick=function(){fn(b.getAttribute('data-cat'));};});
}

// LIST RENDER
function renderList(){
  var f=homeCat==='All'?items:items.filter(function(x){return x.cat===homeCat;});
  var todo=f.filter(function(x){return !x.done;}),done=f.filter(function(x){return x.done;});
  document.getElementById('home-cats').innerHTML=['All'].concat(Object.keys(allCC())).map(function(c){return chipHTML(c,homeCat===c);}).join('');
  bindCats('home-cats',function(c){homeCat=c;openDeleteId=null;renderList();});
  document.getElementById('list-todo').innerHTML=todo.length?todo.map(itemHTML).join(''):'<div style="text-align:center;padding:24px 0;font-size:12px;font-weight:800;color:rgba(255,255,255,0.18);text-transform:uppercase">no ideas yet ✦</div>';
  document.getElementById('list-done').innerHTML=done.map(itemHTML).join('');
  document.getElementById('sec-done').style.display=done.length?'block':'none';
  bindItemEvents();
}

function itemHTML(item){
  var c=CC[item.cat]||'#fff',isOpen=openDeleteId===item.id;
  var catColors={Travel:'rgba(94,231,255,0.15)',Food:'rgba(255,159,74,0.15)',Fun:'rgba(255,110,180,0.15)',Romance:'rgba(255,106,220,0.15)',Adventure:'rgba(215,253,90,0.15)',Other:'rgba(255,92,92,0.15)'};
  var catTextColors={Travel:'#5ee7ff',Food:'#ff9f4a',Fun:'#ff6eb4',Romance:'#ff6adc',Adventure:'#d7fd5a',Other:'#ff5c5c'};
  var bg=catColors[item.cat]||'rgba(255,255,255,0.1)';
  var tc=catTextColors[item.cat]||'#fff';
  var h='<div class="item-wrap" id="wrap-'+item.id+'">';
  if(isOpen)h+='<div class="delete-menu"><button class="del-btn confirm" data-delid="'+item.id+'">Delete</button><button class="del-btn cancel-del">Cancel</button></div>';
  h+='<div class="item'+(item.done?' done':'')+'" id="item-'+item.id+'">';
  // checkbox
  h+='<div class="checkbox'+(item.done?' checked':'')+'" data-check="'+item.id+'">';
  if(item.done)h+='<span class="material-symbols-outlined" style="font-size:18px;color:#9492ff;font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24;pointer-events:none">check</span>';
  h+='</div>';
  // body
  h+='<div class="item-body">';
  h+='<div class="item-text'+(item.done?' done-text':'')+'">'+(item.title||'')+'</div>';
  if(item.cat){
    h+='<div class="item-badges">';
    h+='<span class="item-badge" style="background:'+bg+';color:'+tc+'">'+item.cat+'</span>';
    h+='</div>';
  }
  h+='</div>';
  // drag indicator
  h+='<span class="material-symbols-outlined item-drag">drag_indicator</span>';
  h+='</div></div>';
  return h;
}

function bindItemEvents(){
  document.querySelectorAll('[data-check]').forEach(function(el){
    el.addEventListener('click',function(e){e.stopPropagation();onCheck(el.getAttribute('data-check'));});
    el.addEventListener('pointerdown',function(e){e.stopPropagation();});
    el.addEventListener('pointerup',function(e){e.stopPropagation();});
  });
  document.querySelectorAll('.item').forEach(function(el){
    var id=el.id.replace('item-','');
    el.addEventListener('pointerdown',function(){startHold(id,el);});
    el.addEventListener('pointerup',endHold);
    el.addEventListener('pointerleave',endHold);
    el.addEventListener('contextmenu',function(e){e.preventDefault();});
  });
  document.querySelectorAll('.del-btn.confirm').forEach(function(btn){btn.addEventListener('click',function(){removeItem(btn.getAttribute('data-delid'));openDeleteId=null;});});
  document.querySelectorAll('.del-btn.cancel-del').forEach(function(btn){btn.addEventListener('click',function(){openDeleteId=null;renderList();});});
}

function startHold(id,el){el.classList.add('pressing');holdTimer=setTimeout(function(){openDeleteId=id;renderList();},500);}
function endHold(){clearTimeout(holdTimer);document.querySelectorAll('.item.pressing').forEach(function(el){el.classList.remove('pressing');});}
function onCheck(id){var item=items.find(function(x){return x.id===id;});if(!item)return;if(!item.done)openDoneModal(item);}

// MEMORY RENDER
function renderMem(){
  var memories=items.filter(function(x){return x.done;});
  var f=memCat==='All'?memories:memories.filter(function(x){return x.cat===memCat;});

function attachSwipe(f){
  var stack=document.getElementById('cstack');if(!stack)return;
  var topCard=stack.querySelector('.polaroid:last-child');if(!topCard)return;
  var startX=0,startY=0,dragging=false,hasMoved=false,lpt=null;
  function onStart(x,y){startX=x;startY=y;dragging=true;hasMoved=false;topCard.style.transition='none';lpt=setTimeout(function(){if(!hasMoved){dragging=false;showMemDeleteConfirm(topCard,topCard.getAttribute('data-memid'));}},600);}
  function onMove(x,y){if(!dragging)return;var dx=x-startX,dy=y-startY;if(Math.abs(dx)>6||Math.abs(dy)>6){hasMoved=true;clearTimeout(lpt);}if(!hasMoved)return;topCard.style.transform='translateX('+dx+'px) translateY('+(dy*0.25)+'px) rotate('+(-1.5+dx*0.07)+'deg)';}
  function onEnd(x){if(!dragging)return;dragging=false;clearTimeout(lpt);var dx=x-startX;if(hasMoved&&Math.abs(dx)>70){topCard.style.transition='transform 0.3s ease,opacity 0.3s ease';topCard.style.transform='translateX('+(dx>0?600:-600)+'px) rotate('+(dx>0?30:-30)+'deg)';topCard.style.opacity='0';window._cardIdx=(window._cardIdx+1)%f.length;setTimeout(renderMem,300);}else{topCard.style.transition='transform 0.25s ease';topCard.style.transform='translateX(-54%) rotate(-1.5deg)';if(!hasMoved){var id=topCard.getAttribute('data-memid');if(id)openMemDetail(id);}}}
  topCard.addEventListener('touchstart',function(e){e.preventDefault();onStart(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
  topCard.addEventListener('touchmove',function(e){e.preventDefault();onMove(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
  topCard.addEventListener('touchend',function(e){e.preventDefault();onEnd(e.changedTouches[0].clientX);},{passive:false});
  topCard.addEventListener('mousedown',function(e){e.preventDefault();onStart(e.clientX,e.clientY);});
  document.addEventListener('mousemove',function(e){if(dragging)onMove(e.clientX,e.clientY);});
  document.addEventListener('mouseup',function(e){if(dragging)onEnd(e.clientX);});
}

function showMemDeleteConfirm(el,id){

// CANVAS
var applyingRemote=false,penColor='#d7fd5a',boardObjects=[],nextObjId=1,MAX_UNDO=20;
var isDrawing=false,lastX=0,lastY=0,currentTool='pen',saveCanvasTimer=null,saveObjectsTimer=null;

function initCanvas(){
  var c=document.getElementById('draw-canvas');
  var wrap=c.parentElement;
  c.width=wrap.offsetWidth;c.height=Math.max(500,wrap.offsetHeight);
  c.style.width='100%';c.style.height='100%';
  canvasRef.on('value',function(snap){
    if(applyingRemote)return;
    var data=snap.val();
    var ctx=c.getContext('2d');
    if(data){var img=new Image();img.onload=function(){ctx.clearRect(0,0,c.width,c.height);ctx.drawImage(img,0,0,c.width,c.height);};img.src=data;}
    else ctx.clearRect(0,0,c.width,c.height);
  });
  db.ref('canvas_objects').on('value',function(snap){
    if(applyingRemote)return;
    var data=snap.val();
    boardObjects=data&&Array.isArray(data)?data:[];
    renderObjects();
  });
}

function getPos(e){
  var c=document.getElementById('draw-canvas');
  var rect=c.getBoundingClientRect();
  var scaleX=c.width/rect.width,scaleY=c.height/rect.height;
  var cx=e.touches?e.touches[0].clientX:e.clientX;
  var cy=e.touches?e.touches[0].clientY:e.clientY;
  return{x:(cx-rect.left)*scaleX,y:(cy-rect.top)*scaleY};
}

function saveToUndoStack(){
  var c=document.getElementById('draw-canvas');
  var state={canvas:c.toDataURL('image/png',0.5),objects:JSON.parse(JSON.stringify(boardObjects)),ts:Date.now()};
  db.ref('canvas_undo').once('value',function(snap){
    var stack=snap.val()||[];if(!Array.isArray(stack))stack=[];
    stack.push(state);if(stack.length>MAX_UNDO)stack=stack.slice(stack.length-MAX_UNDO);
    db.ref('canvas_undo').set(stack);
  });
}

function undo(){
  db.ref('canvas_undo').once('value',function(snap){
    var stack=snap.val()||[];if(!Array.isArray(stack)||stack.length===0)return;
    var prev=stack.pop();db.ref('canvas_undo').set(stack);
    applyingRemote=true;
    var c=document.getElementById('draw-canvas');
    var img=new Image();
    img.onload=function(){c.getContext('2d').clearRect(0,0,c.width,c.height);c.getContext('2d').drawImage(img,0,0,c.width,c.height);canvasRef.set(prev.canvas);applyingRemote=false;};
    img.src=prev.canvas;
    boardObjects=prev.objects||[];renderObjects();
    db.ref('canvas_objects').set(boardObjects.length>0?boardObjects:null);
  });
}

function startDraw(e){
  if(currentTool!=='pen')return;e.preventDefault();
  saveToUndoStack();isDrawing=true;
  var pos=getPos(e);lastX=pos.x;lastY=pos.y;
  var c=document.getElementById('draw-canvas');
  c.getContext('2d').beginPath();c.getContext('2d').moveTo(lastX,lastY);
}
function draw(e){
  if(!isDrawing||currentTool!=='pen')return;e.preventDefault();
  var c=document.getElementById('draw-canvas'),ctx=c.getContext('2d'),pos=getPos(e);
  ctx.beginPath();ctx.moveTo(lastX,lastY);ctx.lineTo(pos.x,pos.y);
  ctx.strokeStyle=penColor;ctx.lineWidth=4;ctx.lineCap='round';ctx.lineJoin='round';ctx.globalAlpha=1;ctx.stroke();
  lastX=pos.x;lastY=pos.y;
  clearTimeout(saveCanvasTimer);saveCanvasTimer=setTimeout(function(){applyingRemote=true;canvasRef.set(document.getElementById('draw-canvas').toDataURL('image/png',0.5),function(){setTimeout(function(){applyingRemote=false;},500);});},800);
}
function stopDraw(){if(isDrawing)isDrawing=false;}

function addObject(type,content,color){
  color=color||penColor;saveToUndoStack();
  var c=document.getElementById('draw-canvas');
  var obj={id:nextObjId++,type:type,content:content,color:color,x:Math.random()*(c.width-150)+50,y:Math.random()*(c.height-100)+50,rotation:(Math.random()-0.5)*8};
  boardObjects.push(obj);renderObjects();
  applyingRemote=true;db.ref('canvas_objects').set(boardObjects,function(){setTimeout(function(){applyingRemote=false;},500);});
}

function getContrastColor(hex){
  if(!hex)return'#fff';var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return(0.299*r+0.587*g+0.114*b)/255>0.5?'#000':'#fff';
}

function renderObjects(){
  var layer=document.getElementById('objects-layer');if(!layer)return;
  layer.innerHTML='';layer.style.pointerEvents='none';
  boardObjects.forEach(function(obj){
    var el=document.createElement('div');
    el.style.cssText='position:absolute;touch-action:none;user-select:none;cursor:grab;pointer-events:auto;left:'+obj.x+'px;top:'+obj.y+'px';
    el.dataset.id=obj.id;
    if(obj.type==='text'){
      el.innerHTML='<div style="position:relative;padding:12px 20px;border-radius:16px;font-family:Roboto Flex,sans-serif;font-weight:900;font-size:16px;backdrop-filter:blur(10px);background:'+obj.color+';color:'+getContrastColor(obj.color)+';transform:rotate('+obj.rotation+'deg);box-shadow:0 0 20px '+obj.color+'44;white-space:nowrap">'+obj.content+'<div style="position:absolute;bottom:-8px;left:20px;width:16px;height:16px;background:'+obj.color+';clip-path:polygon(0 0,100% 0,0 100%)"></div></div>';
    } else {
      el.innerHTML='<div style="font-size:48px;transform:rotate('+obj.rotation+'deg);filter:drop-shadow(0 4px 8px rgba(0,0,0,0.5))">'+obj.content+'</div>';
    }
    makeDraggable(el,obj);layer.appendChild(el);
  });
}

function makeDraggable(el,obj){
  var startX=0,startY=0,moving=false,trash=document.getElementById('trash-bin');
  function onStart(e){
    moving=true;var cx=e.touches?e.touches[0].clientX:e.clientX,cy=e.touches?e.touches[0].clientY:e.clientY;
    startX=cx-obj.x;startY=cy-obj.y;el.style.zIndex=1000;
    if(trash){trash.style.opacity='1';trash.style.transform='scale(1)';trash.style.pointerEvents='auto';}
  }
  function onMove(e){
    if(!moving)return;e.preventDefault();
    var cx=e.touches?e.touches[0].clientX:e.clientX,cy=e.touches?e.touches[0].clientY:e.clientY;
    obj.x=cx-startX;obj.y=cy-startY;el.style.left=obj.x+'px';el.style.top=obj.y+'px';
    if(trash){var br=trash.getBoundingClientRect();var over=cx>br.left&&cx<br.right&&cy>br.top&&cy<br.bottom;trash.style.background=over?'rgba(215,110,132,0.3)':'rgba(26,25,25,0.6)';trash.style.color=over?'#ff6e84':'rgba(255,255,255,0.4)';trash.style.transform=over?'scale(1.15)':'scale(1)';}
  }
  function onEnd(e){
    if(!moving)return;moving=false;el.style.zIndex='';
    var cx=e.changedTouches?e.changedTouches[0].clientX:e.clientX,cy=e.changedTouches?e.changedTouches[0].clientY:e.clientY;
    if(trash){
      var br=trash.getBoundingClientRect();
      if(cx>br.left&&cx<br.right&&cy>br.top&&cy<br.bottom){boardObjects=boardObjects.filter(function(o){return o.id!==obj.id;});renderObjects();applyingRemote=true;db.ref('canvas_objects').set(boardObjects.length>0?boardObjects:null,function(){setTimeout(function(){applyingRemote=false;},500);});}
      else{clearTimeout(saveObjectsTimer);saveObjectsTimer=setTimeout(function(){applyingRemote=true;db.ref('canvas_objects').set(boardObjects,function(){setTimeout(function(){applyingRemote=false;},500);});},600);}
      trash.style.opacity='0';trash.style.transform='scale(0.8)';trash.style.pointerEvents='none';trash.style.background='rgba(26,25,25,0.6)';trash.style.color='rgba(255,255,255,0.4)';
    }
  }
  el.addEventListener('mousedown',onStart);el.addEventListener('touchstart',onStart,{passive:false});
  window.addEventListener('mousemove',onMove);window.addEventListener('touchmove',onMove,{passive:false});
  window.addEventListener('mouseup',function(e){if(moving)onEnd(e);});
  window.addEventListener('touchend',function(e){if(moving)onEnd(e);},{passive:false});
}

function openAddModal(){
  document.getElementById('modal-container').innerHTML=
    '<div class="modal-overlay" id="mov" style="align-items:flex-end;padding:0">'
    +'<div class="modal-sheet" style="border-radius:32px 32px 0 0;padding:32px 24px 40px;max-width:100%;width:100%">'
    +'<div class="drag-handle"></div>'
    +'<h2 style="font-size:28px;font-weight:900;color:#fff;letter-spacing:-0.02em;text-transform:uppercase;margin-bottom:8px">NEW IDEA</h2>'
    +'<p style="font-size:14px;color:rgba(173,170,170,1);margin-bottom:24px">Capture a new experience to share together.</p>'
    +'<div style="font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:0.1em;color:rgba(215,253,90,0.8);margin-bottom:10px;padding:0 4px">CATEGORY</div>'
    +'<div class="cat-row">'+catPickerHTML()+'</div>'
    +'<div style="font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:0.1em;color:rgba(215,253,90,0.8);margin-bottom:10px;padding:0 4px">IDEA</div>'
    +'<div style="background:rgba(19,19,19,1);border-radius:100px;border:1px solid rgba(255,255,255,0.05);padding:4px">'
    +'<input class="m3-input" id="ni" placeholder="What do you want to do together?" style="margin:0;border-radius:100px;padding:16px 24px"/>'
    +'</div>'
    +'<div style="margin-top:24px;display:flex;flex-direction:column;gap:12px">'
    +'<button class="btn-filled" id="btn-add-item" style="padding:18px;font-size:16px;letter-spacing:0.06em">ADD TO LIST</button>'
    +'<button id="btn-cancel-add" style="background:none;border:none;color:rgba(255,255,255,0.5);font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;cursor:pointer;padding:8px">Cancel</button>'
    +'</div></div></div>';
  bindPickerClicks();
  document.getElementById('btn-add-item').onclick=addItem;
  document.getElementById('btn-cancel-add').onclick=closeModal;
  document.getElementById('mov').onclick=function(e){if(e.target.id==='mov')closeModal();};
  document.getElementById('ni').onkeydown=function(e){if(e.key==='Enter')addItem();};
  setTimeout(function(){var el=document.getElementById('ni');if(el)el.focus();},50);
}
function openDoneModal(item){
  tempPhotos=[];
  document.getElementById('modal-container').innerHTML=
    '<div class="modal-overlay" id="mov"><div class="modal-sheet" style="position:relative">'
    +'<button class="modal-close" id="btn-close-done">✕</button>'
    +'<div class="modal-label">you did it! 🎉</div>'
    +'<div class="modal-item-name">'+(item.title||'')+'</div>'
    +'<div class="photo-grid" id="pgrid">'+photoSlots()+'</div>'
    +'<input class="m3-input" id="note-in" placeholder="write a memory note..."/>'
    +'<div class="modal-btns"><button class="btn-filled pink" id="btn-confirm-done">We\'ve done it!</button><button class="btn-outlined" id="btn-cancel-done">Cancel</button></div>'
    +'</div></div>';
  document.getElementById('btn-close-done').onclick=closeModal;
  document.getElementById('btn-cancel-done').onclick=closeModal;
  document.getElementById('btn-confirm-done').onclick=function(){confirmDone(item.id);};
  document.getElementById('mov').onclick=function(e){if(e.target.id==='mov')closeModal();};
  bindPhotoSlots();
}
function openMemDetail(id){
  var m=items.find(function(x){return x.id===id;});if(!m)return;
  var c=CC[m.cat]||'#fff',photos=m.photos||[];
  document.getElementById('modal-container').innerHTML=
    '<div class="modal-overlay" id="mov"><div class="modal-sheet" style="position:relative">'
    +'<button class="modal-close" id="btn-close-mem">✕</button>'
    +'<span class="mem-cat-badge" style="background:'+c+'">'+m.cat+'</span>'
    +'<div class="modal-title" style="margin-bottom:4px;text-align:left">'+(m.title||'')+'</div>'
    +'<div style="font-size:11px;font-weight:700;color:rgba(255,255,255,0.3);margin-bottom:14px;text-transform:uppercase">'+(m.date||'')+'</div>'
    +'<div class="mem-photos">'
    +(photos.length>0?photos.map(function(p){return '<div class="mem-photo"><img src="'+p+'"/></div>';}).join(''):[memEmoji(m.cat),'📸','📸','📸'].map(function(e){return '<div class="mem-photo">'+e+'</div>';}).join(''))
    +'</div>'+(m.note?'<div class="mem-note">'+m.note+'</div>':'')
    +'</div></div>';
  document.getElementById('btn-close-mem').onclick=closeModal;
  document.getElementById('mov').onclick=function(e){if(e.target.id==='mov')closeModal();};
}
function photoSlots(){
  var h='';for(var i=0;i<4;i++){
    if(i<tempPhotos.length)h+='<div class="photo-slot"><img src="'+tempPhotos[i]+'"/></div>';
    else if(i===tempPhotos.length)h+='<label class="photo-slot" data-photoidx="'+i+'"><input type="file" accept="image/*" style="display:none"/><div class="plus-ic">+</div></label>';
    else h+='<div class="photo-slot"></div>';
  }return h;
}
function bindPhotoSlots(){
  document.querySelectorAll('[data-photoidx]').forEach(function(label){
    var idx=parseInt(label.getAttribute('data-photoidx')),input=label.querySelector('input[type=file]');
    if(input)input.onchange=function(){var file=input.files[0];if(!file)return;var r=new FileReader();r.onload=function(e){tempPhotos[idx]=e.target.result;document.getElementById('pgrid').innerHTML=photoSlots();bindPhotoSlots();};r.readAsDataURL(file);};
  });
}
function confirmDone(id){
  var item=items.find(function(x){return x.id===id;});if(!item)return;
  var note=(document.getElementById('note-in')||{}).value||'';
  var date=new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  saveItem(Object.assign({},item,{done:true,photos:tempPhotos.slice(),note:note,date:date}));closeModal();
}
function addItem(){
  var ni=document.getElementById('ni'),t=ni?ni.value.trim():'';if(!t)return;
  newItem({title:t,cat:newCat,done:false,photos:[],note:'',date:''});closeModal();
}
function closeModal(){document.getElementById('modal-container').innerHTML='';}
</script>
</body>
</html>
