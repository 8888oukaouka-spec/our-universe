<!DOCTYPE html>

<head>

<title>Our Universe ✦</title>
<style>

  html,body{height:100%;width:100%;background:#0a0a0a;overflow:hidden}
  body{font-family:system-ui,-apple-system,sans-serif}
  .phone{width:100%;height:100dvh;background:#0a0a0a;overflow:hidden;position:relative}
  .stars{position:absolute;inset:0;pointer-events:none;z-index:0}
  .star{position:absolute;background:#fff;border-radius:50%}
  .screen{position:relative;z-index:1;height:100%;display:flex;flex-direction:column;overflow:hidden}
  .page{display:none;flex-direction:column;flex:1;overflow:hidden}
  .page.active{display:flex}
  .fixed-top{flex-shrink:0;padding:0 20px;background:#0a0a0a;z-index:20}
  .header{padding:max(52px,calc(44px + env(safe-area-inset-top))) 0 14px;display:flex;justify-content:space-between;align-items:flex-end}
  .header-sub{font-size:11px;font-weight:800;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:5px}
  .header-title{font-size:26px;font-weight:900;color:#fff;line-height:1.15;letter-spacing:-0.02em}
  .header-title span{color:#e8f04a}
  .mode-toggle{background:rgba(255,255,255,0.08);border:none;border-radius:50px;font-size:11px;font-weight:800;color:rgba(255,255,255,0.6);cursor:pointer;text-transform:uppercase;letter-spacing:0.05em;white-space:nowrap;transition:background 0.15s,color 0.15s;width:100px;height:34px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .mode-toggle:hover{background:rgba(255,255,255,0.14);color:#fff}
  .cats-sticky{padding:10px 20px 12px;background:#0a0a0a;z-index:20;flex-shrink:0}
  .cats{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none}
  .cats::-webkit-scrollbar{display:none}
  .cat{flex-shrink:0;height:32px;padding:0 16px;border-radius:8px;font-size:12px;font-weight:800;cursor:pointer;text-transform:uppercase;letter-spacing:0.06em;outline:none;border:none;display:inline-flex;align-items:center;transition:background 0.15s,color 0.15s}
  .cat.inactive{background:#1e1e30;color:rgba(255,255,255,0.45)}
  .cat.inactive:hover{background:#26263c;color:rgba(255,255,255,0.7)}
  .cat.active{color:#0a0a0a}
  .scroll-area{flex:1;overflow-y:auto;padding:0 20px calc(100px + env(safe-area-inset-bottom));scrollbar-width:none}
  .scroll-area::-webkit-scrollbar{display:none}
  .add-btn{width:100%;padding:16px 20px;background:#4040e0;border-radius:22px;border:none;display:flex;align-items:center;gap:12px;cursor:pointer;margin-bottom:14px;transition:all 0.15s}

  .item-wrap{position:relative;margin-bottom:8px}
  .item{width:100%;padding:14px 16px;border-radius:22px;border:none;display:flex;align-items:center;gap:12px;text-align:left;background:#111120;transition:transform 0.15s,background 0.15s;cursor:default;user-select:none}
  .item.done{background:rgba(255,255,255,0.03)}
  .item.pressing{transform:scale(0.97);background:#1e1e30}
  .checkbox{width:24px;height:24px;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,0.18);cursor:pointer;transition:all 0.15s}

  .item-text{font-size:14px;font-weight:800;text-transform:uppercase;letter-spacing:0.02em;flex:1}
  .item-cat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
  .delete-menu{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#1e1e30;border-radius:16px;border:1px solid rgba(255,255,255,0.08);padding:6px;display:flex;gap:6px;z-index:100;white-space:nowrap}
  .del-btn{padding:10px 18px;border-radius:12px;font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:0.05em;cursor:pointer;border:none;transition:all 0.12s}

  .del-btn.cancel-del{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.6)}
  .delete-menu::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:#1e1e30}
  .card-stack{position:relative;width:100%;height:380px}
  .polaroid{position:absolute;width:270px;left:50%;background:#f5f0e8;border-radius:20px;padding:12px 12px 44px;cursor:pointer;transition:transform 0.2s;user-select:none}
  .polaroid:nth-child(1){transform:translateX(-50%) rotate(-4deg);z-index:1;top:20px}
  .polaroid:nth-child(2){transform:translateX(-46%) rotate(3deg);z-index:2;top:10px}
  .polaroid:nth-child(3){transform:translateX(-54%) rotate(-1.5deg);z-index:3;top:0}
  .polaroid.pressing{opacity:0.75;transform:translateX(-54%) rotate(-1.5deg) scale(0.97)!important}
  .polaroid-img{width:100%;aspect-ratio:1;border-radius:10px;background:#d8d0c0;display:flex;align-items:center;justify-content:center;font-size:44px;margin-bottom:10px;overflow:hidden}

  .grid-img{width:100%;aspect-ratio:1;background:#161625;display:flex;align-items:center;justify-content:center;font-size:30px;overflow:hidden}

  .grid-body{padding:10px 12px 12px}

  .nav-btn{flex:1;height:100%;border:none;background:transparent;border-radius:100px;font-size:15px;font-weight:900;cursor:pointer;text-transform:uppercase;letter-spacing:0.04em;color:#fff;padding:0;display:flex;align-items:center;justify-content:center;transition:background 0.18s,color 0.18s}

  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px}
  .modal-sheet{border-radius:28px;width:100%;padding:20px;position:relative;background:#111120}
  .modal-close{position:absolute;top:16px;right:16px;width:30px;height:30px;background:rgba(255,255,255,0.08);border:none;border-radius:50%;color:rgba(255,255,255,0.7);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .modal-label{font-size:11px;font-weight:800;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px}
  .modal-title{font-size:18px;font-weight:900;color:#fff;text-transform:uppercase;letter-spacing:-0.01em;margin-bottom:16px}
  .modal-item-name{font-size:15px;font-weight:900;color:#fff;text-transform:uppercase;margin-bottom:14px}
  .m3-input{width:100%;padding:13px 16px;background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.1);border-radius:16px;font-size:14px;font-weight:700;color:#fff;margin-bottom:12px;outline:none;font-family:inherit}

  .m3-input:focus{border-color:#e8f04a}
  .cat-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .cpick{padding:0 14px;height:32px;border-radius:8px;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:0.06em;cursor:pointer;transition:all 0.12s;color:#0a0a0a;border:2.5px solid transparent;display:inline-flex;align-items:center}

  .photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
  .photo-slot{aspect-ratio:1;border-radius:16px;background:rgba(255,255,255,0.05);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;overflow:hidden}

  .plus-ic{font-size:28px;font-weight:900;color:rgba(255,255,255,0.3);line-height:1}
  .modal-btns{display:flex;gap:8px;margin-top:4px}
  .btn-filled{flex:1;padding:14px;background:#e8f04a;border:none;border-radius:50px;font-size:13px;font-weight:900;color:#0a0a0a;text-transform:uppercase;letter-spacing:0.05em;cursor:pointer}

  .btn-outlined{flex:1;padding:13px;background:transparent;border:1.5px solid rgba(255,255,255,0.2);border-radius:50px;font-size:13px;font-weight:900;color:#fff;text-transform:uppercase;letter-spacing:0.05em;cursor:pointer}
  .drag-handle{width:36px;height:4px;background:rgba(255,255,255,0.12);border-radius:2px;margin:0 auto 18px}
  .mem-cat-badge{font-size:10px;font-weight:800;text-transform:uppercase;padding:3px 10px;border-radius:20px;color:#0a0a0a;display:inline-block;margin-bottom:8px}
  .mem-note{font-size:13px;color:rgba(255,255,255,0.5);line-height:1.6;font-weight:600;margin-top:12px}
  .mem-photos{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
  .mem-photo{aspect-ratio:1;border-radius:14px;background:rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:center;font-size:28px;overflow:hidden}
  .mem-photo img{width:100%;height:100%;object-fit:cover}
  .del-confirm-overlay{position:absolute;inset:0;background:rgba(10,10,10,0.85);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;border-radius:20px;z-index:10}
  .del-confirm-title{font-size:12px;font-weight:900;color:#fff;text-transform:uppercase;letter-spacing:0.06em}
  .del-confirm-btns{display:flex;gap:8px}
  .empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:rgba(255,255,255,0.2)}
  .empty-ic{font-size:36px;margin-bottom:10px}
  .empty-tx{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:0.06em}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:#e8f04a;display:inline-block;margin-left:8px;vertical-align:middle;animation:pulse 2s infinite}
  .sync-dot.off{background:#ff5c5c;animation:none}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

  .login-screen{position:fixed;inset:0;background:#0a0a0a;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 32px;font-family:system-ui,-apple-system,sans-serif}
  .login-stars{position:absolute;inset:0;pointer-events:none}
  .login-content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;text-align:center;width:100%;max-width:320px}
  .login-title{font-size:34px;font-weight:900;color:#fff;letter-spacing:-0.02em;line-height:1.1;margin-bottom:8px}
  .login-title span{color:#e8f04a}
  .login-sub{font-size:12px;font-weight:700;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:56px}
  .login-btn{display:flex;align-items:center;justify-content:center;gap:12px;background:#fff;border:none;border-radius:50px;padding:16px 32px;font-size:15px;font-weight:800;color:#0a0a0a;cursor:pointer;width:100%;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
  .login-btn:active{background:#ebebeb;transform:scale(0.98)}
  .login-btn svg{width:20px;height:20px;flex-shrink:0}
  .login-hint{font-size:11px;font-weight:700;color:rgba(255,255,255,0.2);text-transform:uppercase;letter-spacing:0.08em;margin-top:20px}
  .login-error{font-size:12px;font-weight:800;color:#ff5c5c;margin-top:16px;display:none;text-align:center}
  .login-loading{font-size:12px;font-weight:800;color:rgba(255,255,255,0.4);margin-top:16px;display:none;text-transform:uppercase;letter-spacing:0.06em}
</style>
</head>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyBK7lq8QTMHFhx-d2GekIR1u4WAR_sASvU",
  authDomain:"our-universe-7078d.firebaseapp.com",
  databaseURL:"https://our-universe-7078d-default-rtdb.firebaseio.com",
  projectId:"our-universe-7078d",

  messagingSenderId:"790066125607",
  appId:"1:790066125607:web:2c41a381f1b594351b6702"
});
const db = firebase.database();
const itemsRef = db.ref('items');
const auth = firebase.auth();
var ALLOWED = ['yinghuazhang8888@gmail.com'];

// login stars
(function(){
  for(var i=0;i<60;i++){var s=document.createElement('div');s.className='star';var sz=Math.random()*1.8+0.4;s.style.cssText='width:'+sz+'px;height:'+sz+'px;top:'+(Math.random()*100)+'%;left:'+(Math.random()*100)+'%;opacity:'+(Math.random()*0.35+0.1);document.getElementById('login-stars').appendChild(s);}
})();

// sign in button — use touchend for iOS reliability
var googleBtn = document.getElementById('google-btn');
function doSignIn(){
  document.getElementById('login-loading').style.display='block';
  document.getElementById('login-error').style.display='none';
  googleBtn.disabled=true;
  var provider = new firebase.auth.GoogleAuthProvider();
  provider.setCustomParameters({prompt:'select_account'});
  auth.signInWithPopup(provider)
    .then(function(result){
      // auth state change will handle the rest
    })
    .catch(function(err){
      document.getElementById('login-loading').style.display='none';
      document.getElementById('login-error').style.display='block';
      document.getElementById('login-error').textContent='Sign in failed: '+err.message;
      googleBtn.disabled=false;
    });
}
googleBtn.addEventListener('touchend',function(e){e.preventDefault();doSignIn();},{passive:false});
googleBtn.addEventListener('click',function(e){
  // only handle click on non-touch devices
  if(!('ontouchstart' in window)) doSignIn();
});

auth.onAuthStateChanged(function(user){
  var ls = document.getElementById('login-screen');
  if(user){
    if(ALLOWED.indexOf(user.email)!==-1){
      ls.style.display='none';
    } else {
      auth.signOut();
      ls.style.display='flex';
      document.getElementById('login-error').style.display='block';
      document.getElementById('login-error').textContent='Access denied. This app is private.';
      document.getElementById('login-loading').style.display='none';
      googleBtn.disabled=false;
    }
  } else {
    ls.style.display='flex';
  }
});

  var data=snap.val();

},function(){document.getElementById('sync-dot').classList.add('off');});

function newItem(data){itemsRef.push(data);}

function chipHTML(c,active){
  if(active){var col=CHIP_ACTIVE[c]||{bg:'#e8f04a',text:'#0a0a0a'};return '<button class="cat active" style="background:'+col.bg+';color:'+col.text+'" data-cat="'+c+'">'+c+'</button>';}
  return '<button class="cat inactive" data-cat="'+c+'">'+c+'</button>';
}
function bindCatClicks(id,fn){
  var el=document.getElementById(id);if(!el)return;
  el.querySelectorAll('.cat').forEach(function(b){b.addEventListener('click',function(){fn(b.getAttribute('data-cat'));});});
}

function switchPage(p){
  document.getElementById('page-home').classList.toggle('active',p==='home');
  document.getElementById('page-memory').classList.toggle('active',p==='memory');
  document.getElementById('nav-home').classList.toggle('active',p==='home');
  document.getElementById('nav-mem').classList.toggle('active',p==='memory');
  openDeleteId=null;
  if(p==='memory') renderMem(); else renderHome();
}

function renderHome(){
  var f=homeCat==='All'?items:items.filter(function(x){return x.cat===homeCat;});
  var todo=f.filter(function(x){return !x.done;}),done=f.filter(function(x){return x.done;});
  document.getElementById('home-cats').innerHTML=CATS.map(function(c){return chipHTML(c,homeCat===c);}).join('');
  bindCatClicks('home-cats',function(c){homeCat=c;openDeleteId=null;renderHome();});
  document.getElementById('list-todo').innerHTML=todo.length?todo.map(itemHTML).join(''):'<div style="text-align:center;padding:24px 0;font-size:12px;font-weight:800;color:rgba(255,255,255,0.18);text-transform:uppercase;letter-spacing:0.06em">no ideas yet ✦</div>';
  document.getElementById('list-done').innerHTML=done.map(itemHTML).join('');
  document.getElementById('sec-done').style.display=done.length?'block':'none';
  bindItemEvents();
}

function itemHTML(item){
  var c=CC[item.cat]||'#fff';
  var isOpen=openDeleteId===item.id;
  return '<div class="item-wrap" id="wrap-'+item.id+'">'
    +(isOpen?'<div class="delete-menu"><button class="del-btn confirm" data-delid="'+item.id+'">Delete</button><button class="del-btn cancel-del">Cancel</button></div>':'')
    +'<div class="item'+(item.done?' done':'')+'" id="item-'+item.id+'">'
    +'<div class="checkbox'+(item.done?' checked':'')+'" style="'+(item.done?'background:'+c+';border:none':'')+'" data-check="'+item.id+'">'
    +(item.done?'<svg width="13" height="13" viewBox="0 0 14 14" fill="none" style="pointer-events:none"><path d="M2.5 7L5.5 10L11.5 4" stroke="#0a0a0a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>':'')
    +'</div>'
    +'<span class="item-text" style="color:'+(item.done?'rgba(255,255,255,0.25)':'#fff')+(item.done?';text-decoration:line-through':'')+'">'+(item.title||'')+'</span>'
    +'<div class="item-cat-dot" style="background:'+c+'"></div>'
    +'</div></div>';
}

function bindItemEvents(){
  document.querySelectorAll('[data-check]').forEach(function(el){
    el.addEventListener('click',function(e){e.stopPropagation();onCheck(el.getAttribute('data-check'));});
    el.addEventListener('pointerdown',function(e){e.stopPropagation();});
    el.addEventListener('pointerup',function(e){e.stopPropagation();});
  });
  // long press on ALL items (both todo and done)
  document.querySelectorAll('.item').forEach(function(el){
    var id=el.id.replace('item-','');
    el.addEventListener('pointerdown',function(){startHold(id,el);});
    el.addEventListener('pointerup',endHold);
    el.addEventListener('pointerleave',endHold);
    el.addEventListener('contextmenu',function(e){e.preventDefault();});
  });
  document.querySelectorAll('.del-btn.confirm').forEach(function(btn){
    btn.addEventListener('click',function(){removeItem(btn.getAttribute('data-delid'));openDeleteId=null;});
  });
  document.querySelectorAll('.del-btn.cancel-del').forEach(function(btn){
    btn.addEventListener('click',function(){openDeleteId=null;renderHome();});
  });
}

function startHold(id,el){
  el.classList.add('pressing');
  holdTimer=setTimeout(function(){openDeleteId=id;renderHome();},500);
}
function endHold(){
  clearTimeout(holdTimer);
  document.querySelectorAll('.item.pressing').forEach(function(el){el.classList.remove('pressing');});
}

function onCheck(id){
  var item=items.find(function(x){return x.id===id;});if(!item)return;
  if(!item.done) openDoneModal(item);
}

function renderMem(){
  var memories=items.filter(function(x){return x.done;});
  var f=memCat==='All'?memories:memories.filter(function(x){return x.cat===memCat;});
  document.getElementById('mem-cats').innerHTML=CATS.map(function(c){return chipHTML(c,memCat===c);}).join('');
  bindCatClicks('mem-cats',function(c){memCat=c;renderMem();});
  document.getElementById('mode-label').textContent=memMode==='card'?'Board Mode':'Card Mode';
  var scrollArea=document.getElementById('mem-scroll-area');
  var va=document.getElementById('mem-view');
  if(f.length===0){
    scrollArea.style.overflow='hidden';
    va.style.cssText='height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center';
    va.innerHTML='<div class="empty-state"><div class="empty-ic">✦</div><div class="empty-tx">No memories yet</div></div>';
    return;
  }
  if(memMode==='card'){
    scrollArea.style.overflow='hidden';
    va.style.cssText='height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding-bottom:50px';
    if(typeof window._cardIdx==='undefined'||window._cardIdx>=f.length)window._cardIdx=0;
    var visCards=[];
    for(var k=0;k<Math.min(3,f.length);k++) visCards.push(f[(window._cardIdx+k)%f.length]);
    va.innerHTML='<div class="card-stack" id="cstack">'+visCards.map(function(m,si){
      var tf=si===0?'transform:translateX(-50%) rotate(-4deg);top:20px':si===1?'transform:translateX(-46%) rotate(3deg);top:10px':'transform:translateX(-54%) rotate(-1.5deg);top:0';
      return '<div class="polaroid" data-memid="'+m.id+'" style="z-index:'+(si+1)+';'+tf+'">'
        +'<div class="polaroid-img">'+(m.photos&&m.photos[0]?'<img src="'+m.photos[0]+'"/>':memEmoji(m.cat))+'</div>'
        +'<div class="polaroid-title">'+(m.title||'')+'</div>'
        +'<div class="polaroid-date">'+(m.date||'2026')+'</div>'
        +'<div class="polaroid-cat" style="background:'+(CC[m.cat]||'#fff')+'">'+m.cat+'</div>'
        +'</div>';
    }).join('')+'</div>'
    +'<div class="stack-hint">'+(window._cardIdx+1)+' / '+f.length+' · swipe to browse</div>';
    attachSwipe(f);
  } else {
    scrollArea.style.overflow='auto';
    va.style.cssText='padding:4px 0 20px';
    va.innerHTML='<div class="grid-view">'+f.map(function(m){
      return '<div class="grid-card" data-memid="'+m.id+'">'
        +'<div class="grid-img">'+(m.photos&&m.photos[0]?'<img src="'+m.photos[0]+'"/>':memEmoji(m.cat))+'</div>'
        +'<div class="grid-body"><div class="grid-title">'+(m.title||'')+'</div><div class="grid-date">'+(m.date||'2026')+'</div></div>'
        +'</div>';
    }).join('')+'</div>';
  }
  // bind tap = open detail, long press = delete confirm overlay
  va.querySelectorAll('[data-memid]').forEach(function(el){
    var id=el.getAttribute('data-memid');
    var moved=false;
    el.addEventListener('pointerdown',function(){
      moved=false;
      el.classList.add('pressing');
      holdTimer=setTimeout(function(){
        el.classList.remove('pressing');
        showMemDeleteConfirm(el,id);
      },500);
    });
    el.addEventListener('pointermove',function(){moved=true;clearTimeout(holdTimer);el.classList.remove('pressing');});
    el.addEventListener('pointerup',function(){
      clearTimeout(holdTimer);
      el.classList.remove('pressing');
      if(!moved && !el.querySelector('.del-confirm-overlay')) openMemDetail(id);
    });
    el.addEventListener('pointerleave',function(){clearTimeout(holdTimer);el.classList.remove('pressing');});
    el.addEventListener('contextmenu',function(e){e.preventDefault();});
  });
}

function attachSwipe(f){
  var stack=document.getElementById('cstack');if(!stack)return;
  var topCard=stack.querySelector('.polaroid:last-child');if(!topCard)return;
  var startX=0,startY=0,dragging=false,hasMoved=false,lpt=null;
  function onStart(x,y){startX=x;startY=y;dragging=true;hasMoved=false;topCard.style.transition='none';lpt=setTimeout(function(){if(!hasMoved){dragging=false;showMemDeleteConfirm(topCard,topCard.getAttribute('data-memid'));}},600);}
  function onMove(x,y){if(!dragging)return;var dx=x-startX,dy=y-startY;if(Math.abs(dx)>6||Math.abs(dy)>6){hasMoved=true;clearTimeout(lpt);}if(!hasMoved)return;topCard.style.transform='translateX('+dx+'px) translateY('+(dy*0.25)+'px) rotate('+(-1.5+dx*0.07)+'deg)';}
  function onEnd(x){if(!dragging)return;dragging=false;clearTimeout(lpt);var dx=x-startX;if(hasMoved&&Math.abs(dx)>70){topCard.style.transition='transform 0.3s ease,opacity 0.3s ease';topCard.style.transform='translateX('+(dx>0?600:-600)+'px) rotate('+(dx>0?30:-30)+'deg)';topCard.style.opacity='0';window._cardIdx=(window._cardIdx+1)%f.length;setTimeout(renderMem,300);}else{topCard.style.transition='transform 0.25s ease';topCard.style.transform='translateX(-54%) rotate(-1.5deg)';if(!hasMoved){var id=topCard.getAttribute('data-memid');if(id)openMemDetail(id);}}}
  topCard.addEventListener('touchstart',function(e){e.preventDefault();onStart(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
  topCard.addEventListener('touchmove',function(e){e.preventDefault();onMove(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
  topCard.addEventListener('touchend',function(e){e.preventDefault();onEnd(e.changedTouches[0].clientX);},{passive:false});
  topCard.addEventListener('mousedown',function(e){e.preventDefault();onStart(e.clientX,e.clientY);});
  document.addEventListener('mousemove',function(e){if(dragging)onMove(e.clientX,e.clientY);});
  document.addEventListener('mouseup',function(e){if(dragging)onEnd(e.clientX);});
}
function showMemDeleteConfirm(el,id){
  // inject a dark overlay inside the card
  var existing=el.querySelector('.del-confirm-overlay');
  if(existing){existing.remove();return;}
  var ov=document.createElement('div');
  ov.className='del-confirm-overlay';
  ov.innerHTML='<div class="del-confirm-title">delete memory?</div>'
    +'<div class="del-confirm-btns">'
    +'<button class="del-btn confirm" id="dco-yes">Delete</button>'
    +'<button class="del-btn cancel-del" id="dco-no">Cancel</button>'
    +'</div>';
  el.appendChild(ov);
  el.querySelector('#dco-yes').addEventListener('click',function(e){e.stopPropagation();removeItem(id);});
  el.querySelector('#dco-no').addEventListener('click',function(e){e.stopPropagation();ov.remove();});
}

function memEmoji(cat){return{Travel:'⛩️',Food:'🍣',Fun:'🎤',Romance:'🌉',Adventure:'🌌',Other:'✨'}[cat]||'✨';}
function toggleMode(){memMode=memMode==='card'?'grid':'card';renderMem();}

function catPickerHTML(){
  return Object.keys(CC).map(function(c){
    return '<div class="cpick'+(newCat===c?' sel':'')+'" style="background:'+CC[c]+'" data-pickcat="'+c+'">'+c+'</div>';
  }).join('');
}
function bindPickerClicks(){
  document.querySelectorAll('[data-pickcat]').forEach(function(el){
    el.addEventListener('click',function(){
      newCat=el.getAttribute('data-pickcat');
      document.querySelectorAll('[data-pickcat]').forEach(function(e){e.classList.toggle('sel',e.getAttribute('data-pickcat')===newCat);});
    });
  });
}

function openAddModal(){
  document.getElementById('modal-container').innerHTML=
    '<div class="modal-overlay" id="mov">'
    +'<div class="modal-sheet">'
    +'<div class="drag-handle"></div>'
    +'<div class="modal-title">new dream ✦</div>'
    +'<input class="m3-input" id="ni" placeholder="what do you want to do together?"/>'
    +'<div class="cat-row">'+catPickerHTML()+'</div>'
    +'<div class="modal-btns">'
    +'<button class="btn-filled" id="btn-add-item">Add to list +</button>'
    +'<button class="btn-outlined" id="btn-cancel-add">Cancel</button>'
    +'</div></div></div>';
  bindPickerClicks();
  document.getElementById('btn-add-item').addEventListener('click',addItem);
  document.getElementById('btn-cancel-add').addEventListener('click',closeModal);
  document.getElementById('mov').addEventListener('click',function(e){if(e.target.id==='mov')closeModal();});
  document.getElementById('ni').addEventListener('keydown',function(e){if(e.key==='Enter')addItem();});
  setTimeout(function(){var ni=document.getElementById('ni');if(ni)ni.focus();},50);
}

function openDoneModal(item){
  tempPhotos=[];
  document.getElementById('modal-container').innerHTML=
    '<div class="modal-overlay" id="mov">'
    +'<div class="modal-sheet" style="position:relative">'
    +'<button class="modal-close" id="btn-close-done">✕</button>'
    +'<div class="modal-label">you did it! 🎉</div>'
    +'<div class="modal-item-name">'+(item.title||'')+'</div>'
    +'<div class="photo-grid" id="pgrid">'+photoSlots()+'</div>'
    +'<input class="m3-input" id="note-in" placeholder="write a memory note..."/>'
    +'<div class="modal-btns">'
    +'<button class="btn-filled pink" id="btn-confirm-done">We\'ve done it!</button>'
    +'<button class="btn-outlined" id="btn-cancel-done">Cancel</button>'
    +'</div></div></div>';
  document.getElementById('btn-close-done').addEventListener('click',closeModal);
  document.getElementById('btn-cancel-done').addEventListener('click',closeModal);
  document.getElementById('btn-confirm-done').addEventListener('click',function(){confirmDone(item.id);});
  document.getElementById('mov').addEventListener('click',function(e){if(e.target.id==='mov')closeModal();});
  bindPhotoSlots();
}

function openMemDetail(id){
  var m=items.find(function(x){return x.id===id;});if(!m)return;
  var c=CC[m.cat]||'#fff';
  var photos=m.photos||[];
  document.getElementById('modal-container').innerHTML=
    '<div class="modal-overlay" id="mov">'
    +'<div class="modal-sheet" style="position:relative">'
    +'<button class="modal-close" id="btn-close-mem">✕</button>'
    +'<span class="mem-cat-badge" style="background:'+c+'">'+m.cat+'</span>'
    +'<div class="modal-title" style="margin-bottom:4px">'+(m.title||'')+'</div>'
    +'<div style="font-size:11px;font-weight:700;color:rgba(255,255,255,0.3);margin-bottom:14px;text-transform:uppercase;letter-spacing:0.08em">'+(m.date||'2026')+'</div>'
    +'<div class="mem-photos">'
    +(photos.length>0
      ?photos.map(function(p){return '<div class="mem-photo"><img src="'+p+'"/></div>';}).join('')
      :[memEmoji(m.cat),'📸','📸','📸'].map(function(e){return '<div class="mem-photo">'+e+'</div>';}).join(''))
    +'</div>'
    +(m.note?'<div class="mem-note">'+m.note+'</div>':'')
    +'</div></div>';
  document.getElementById('btn-close-mem').addEventListener('click',closeModal);
  document.getElementById('mov').addEventListener('click',function(e){if(e.target.id==='mov')closeModal();});
}

function photoSlots(){
  var h='';
  for(var i=0;i<4;i++){
    if(i<tempPhotos.length) h+='<div class="photo-slot"><img src="'+tempPhotos[i]+'"/></div>';
    else if(i===tempPhotos.length) h+='<label class="photo-slot" data-photoidx="'+i+'"><input type="file" accept="image/*" style="display:none"/><div class="plus-ic">+</div></label>';
    else h+='<div class="photo-slot"></div>';
  }
  return h;
}
function bindPhotoSlots(){
  document.querySelectorAll('[data-photoidx]').forEach(function(label){
    var idx=parseInt(label.getAttribute('data-photoidx'));
    var input=label.querySelector('input[type=file]');
    if(input){
      input.addEventListener('change',function(){
        var file=input.files[0];if(!file)return;
        var r=new FileReader();
        r.onload=function(e){tempPhotos[idx]=e.target.result;document.getElementById('pgrid').innerHTML=photoSlots();bindPhotoSlots();};
        r.readAsDataURL(file);
      });
    }
  });
}

function confirmDone(id){
  var item=items.find(function(x){return x.id===id;});if(!item)return;
  var note=(document.getElementById('note-in')||{}).value||'';
  var date=new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  saveItem(Object.assign({},item,{done:true,photos:tempPhotos.slice(),note:note,date:date}));
  closeModal();
}

function addItem(){
  var ni=document.getElementById('ni');
  var t=ni?ni.value.trim():'';
  if(!t)return;
  newItem({title:t,cat:newCat,done:false,photos:[],note:'',date:''});
  closeModal();
}

function closeModal(){document.getElementById('modal-container').innerHTML='';}
</script>
