<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"/>
<title>Our Universe ✦</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;width:100%;background:#0e0e0e;overflow:hidden}
body{font-family:'Manrope',system-ui,sans-serif}svg path,svg circle,svg rect,svg polyline,svg line,svg polygon{fill:none}
#app{position:fixed;top:0;left:0;right:0;bottom:0;background:#0e0e0e;display:flex;flex-direction:column}
.stars{position:absolute;inset:0;pointer-events:none;z-index:0}
.star{position:absolute;background:#fff;border-radius:50%}
.screen{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.page{display:none;flex-direction:column;flex:1;overflow:hidden;min-height:0}
.page.active{display:flex}

/* ── NAV (3 tabs) ── */
.nav{flex-shrink:0;margin:0 16px;margin-bottom:max(16px,env(safe-area-inset-bottom));background:rgba(30,30,50,0.7);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-radius:100px;display:flex;align-items:center;padding:6px;height:60px;z-index:50}
.nav-btn{flex:1;height:100%;border:none;background:transparent;border-radius:100px;font-size:11px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:0.06em;color:rgba(255,255,255,0.4);padding:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-family:'Manrope',sans-serif;transition:all 0.18s}
.nav-btn svg{transition:stroke 0.18s}
.nav-btn.active{background:linear-gradient(135deg,#c8f04a,#a8d020);color:#0e0e0e}
.nav-btn.active svg{stroke:#0e0e0e}

/* ── SCROLL AREAS ── */
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 16px 20px;scrollbar-width:none}
.scroll-area::-webkit-scrollbar{display:none}

/* ── HOMEPAGE ── */
.home-header{padding:max(52px,calc(44px+env(safe-area-inset-top))) 16px 16px;display:flex;align-items:center;gap:12px}
.couple-avatars{display:flex;margin-right:4px}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;border:2px solid #0e0e0e}
.avatar:nth-child(1){background:linear-gradient(135deg,#c8f04a,#a8d020);margin-right:-8px;z-index:2}
.avatar:nth-child(2){background:linear-gradient(135deg,#bf94ff,#8855dd);z-index:1}
.couple-name{font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;font-weight:800;color:#fff;flex:1}
.edit-name-btn{background:rgba(255,255,255,0.08);border:none;border-radius:50%;width:28px;height:28px;color:rgba(255,255,255,0.4);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center}

/* widgets */
.widget{border-radius:24px;margin-bottom:14px;overflow:hidden;position:relative;padding:1.5px;background:linear-gradient(145deg,rgba(200,240,74,0.35),rgba(77,64,255,0.2) 50%,rgba(255,73,219,0.15))}
.widget-inner{background:radial-gradient(ellipse at bottom left,rgba(77,64,255,0.18) 0%,transparent 60%),radial-gradient(ellipse at top right,rgba(200,240,74,0.1) 0%,transparent 55%),#111120;border-radius:22.5px;overflow:hidden;position:relative}
.widget-header{padding:18px 18px 0;display:flex;justify-content:space-between;align-items:flex-start}
.widget-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:28px;font-weight:900;color:#fff;line-height:1;letter-spacing:-0.02em;text-transform:uppercase}
.widget-arrow{width:32px;height:32px;background:transparent;border-radius:50%;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.5);cursor:pointer;border:none;flex-shrink:0;transition:all 0.15s;padding:0}
.widget-arrow svg{width:24px;height:24px}
.widget-arrow:active{color:#fff;transform:scale(0.95)}

/* FOR YOU widget */
.for-you-widget{background:linear-gradient(160deg,#1a1a2e 0%,#16213e 50%,#1a1a2e 100%)}
.canvas-wrap{position:relative;margin:14px;border-radius:16px;overflow:hidden;background:#0e0e1a;cursor:crosshair}
.draw-canvas{display:block;width:100%;touch-action:none}
.canvas-toolbar{display:flex;align-items:center;gap:8px;padding:10px 14px;background:rgba(255,255,255,0.05);border-radius:0 0 16px 16px;margin:0 14px 14px}
.tool-btn{width:36px;height:36px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all 0.15s;background:rgba(255,255,255,0.08);color:#fff}
.tool-btn.active{background:linear-gradient(135deg,#c8f04a,#a8d020);color:#0e0e0e}
.tool-btn:active{transform:scale(0.92)}
.clear-btn{margin-left:auto;padding:6px 14px;border-radius:50px;border:none;background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.6);font-size:11px;font-weight:700;cursor:pointer;font-family:'Manrope',sans-serif;text-transform:uppercase;letter-spacing:0.06em}
.clear-btn:active{background:rgba(255,80,80,0.3);color:#ff6b6b}

/* BUCKET LIST widget items */
.widget-list{padding:12px 18px 18px}
.widget-item{display:flex;align-items:center;gap:12px;padding:14px 16px;background:rgba(255,255,255,0.05);border-radius:16px;margin-bottom:8px}
.widget-item:last-child{margin-bottom:0}
.widget-check{width:22px;height:22px;border-radius:6px;flex-shrink:0;border:2px solid rgba(255,255,255,0.2)}
.widget-item-text{font-size:14px;font-weight:600;color:rgba(255,255,255,0.85);font-family:'Manrope',sans-serif}
.widget-empty{font-size:13px;color:rgba(255,255,255,0.25);font-weight:600;padding:16px 0;text-align:center}

/* MEMORIES widget */
.mem-widget-img{width:calc(100% - 36px);height:160px;margin:14px 18px 0;border-radius:16px;background:#1e1e35;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:48px}
.mem-widget-img img{width:100%;height:100%;object-fit:cover}
.mem-widget-info{padding:12px 18px 18px;display:flex;align-items:center;gap:8px}
.mem-widget-cat{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.06em}
.mem-widget-title{font-size:14px;font-weight:700;color:#fff;flex:1}
.mem-widget-date{font-size:11px;color:rgba(255,255,255,0.35);font-weight:600}

/* ── BUCKET LIST PAGE ── */
.page-header{padding:max(52px,calc(44px+env(safe-area-inset-top))) 20px 14px;background:#0e0e0e;flex-shrink:0}
.page-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:26px;font-weight:900;color:#fff;line-height:1.15;letter-spacing:-0.02em}
.page-title span{color:#c8f04a}
.page-sub{font-size:11px;font-weight:700;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:5px}
.cats-sticky{padding:10px 20px 12px;background:#0e0e0e;flex-shrink:0}
.cats{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none}
.cats::-webkit-scrollbar{display:none}
.cat{flex-shrink:0;height:32px;padding:0 16px;border-radius:8px;font-size:12px;font-weight:800;cursor:pointer;text-transform:uppercase;letter-spacing:0.06em;outline:none;border:none;display:inline-flex;align-items:center;font-family:'Manrope',sans-serif}
.cat.inactive{background:#1e1e30;color:rgba(255,255,255,0.45)}
.cat.active{color:#0e0e0e}
.add-btn{width:100%;padding:16px 20px;background:linear-gradient(135deg,#4040e0,#2828b0);border-radius:22px;border:none;display:flex;align-items:center;gap:12px;cursor:pointer;margin-bottom:14px;margin-top:4px}
.add-btn:active{transform:scale(0.98)}
.add-icon{width:30px;height:30px;background:linear-gradient(135deg,#c8f04a,#a8d020);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#0e0e0e;flex-shrink:0}
.add-label{font-size:14px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:0.05em;font-family:'Manrope',sans-serif}
.section-label{font-size:11px;font-weight:800;color:rgba(255,255,255,0.25);text-transform:uppercase;letter-spacing:0.1em;margin:16px 0 8px;font-family:'Manrope',sans-serif}
.item-wrap{position:relative;margin-bottom:8px}
.item{width:100%;padding:14px 16px;border-radius:22px;border:none;display:flex;align-items:center;gap:12px;text-align:left;background:#161628;cursor:default;user-select:none;transition:transform 0.15s,opacity 0.15s}
.item.done{background:rgba(255,255,255,0.03)}
.item.pressing{transform:scale(0.97);opacity:0.7}
.checkbox{width:24px;height:24px;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,0.18);cursor:pointer}
.checkbox.checked{border:none}
.item-text{font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:0.02em;flex:1;font-family:'Manrope',sans-serif}
.item-cat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.delete-menu{position:absolute;bottom:calc(100%+6px);left:50%;transform:translateX(-50%);background:#1e1e30;border-radius:16px;border:1px solid rgba(255,255,255,0.08);padding:6px;display:flex;gap:6px;z-index:100;white-space:nowrap}
.del-btn{padding:10px 18px;border-radius:12px;font-size:12px;font-weight:900;text-transform:uppercase;cursor:pointer;border:none;font-family:'Manrope',sans-serif}
.del-btn.confirm{background:#ff5c5c;color:#fff}
.del-btn.cancel-del{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.6)}
.delete-menu::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:#1e1e30}

/* ── MEMORIES PAGE ── */
.card-stack{position:relative;width:100%;height:380px}
.polaroid{position:absolute;width:270px;left:50%;background:#f5f0e8;border-radius:20px;padding:12px 12px 44px;cursor:pointer;user-select:none;touch-action:none}
.polaroid:nth-child(1){transform:translateX(-50%) rotate(-4deg);z-index:1;top:20px}
.polaroid:nth-child(2){transform:translateX(-46%) rotate(3deg);z-index:2;top:10px}
.polaroid:nth-child(3){transform:translateX(-54%) rotate(-1.5deg);z-index:3;top:0}
.polaroid-img{width:100%;aspect-ratio:1;border-radius:10px;background:#d8d0c0;display:flex;align-items:center;justify-content:center;font-size:44px;margin-bottom:10px;overflow:hidden}
.polaroid-img img{width:100%;height:100%;object-fit:cover;border-radius:10px}
.polaroid-title{font-size:14px;font-weight:900;color:#1a1208;text-transform:uppercase;margin-bottom:2px;font-family:'Plus Jakarta Sans',sans-serif}
.polaroid-date{font-size:11px;color:#7a6a50;font-weight:600}
.polaroid-cat{position:absolute;bottom:12px;right:12px;font-size:10px;font-weight:800;text-transform:uppercase;padding:3px 8px;border-radius:20px;color:#0e0e0e}
.stack-hint{font-size:11px;font-weight:800;color:rgba(255,255,255,0.2);text-transform:uppercase;letter-spacing:0.08em;text-align:center;margin-top:16px}
.grid-view{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid-card{background:#161628;border-radius:20px;overflow:hidden;cursor:pointer;position:relative;user-select:none}
.grid-card:active{transform:scale(0.97)}
.grid-img{width:100%;aspect-ratio:1;background:#1e1e35;display:flex;align-items:center;justify-content:center;font-size:30px;overflow:hidden}
.grid-img img{width:100%;height:100%;object-fit:cover}
.grid-body{padding:10px 12px 12px}
.grid-title{font-size:12px;font-weight:800;color:#fff;text-transform:uppercase;margin-bottom:3px;font-family:'Plus Jakarta Sans',sans-serif}
.grid-date{font-size:10px;color:rgba(255,255,255,0.3);font-weight:600}
.mode-toggle{background:rgba(255,255,255,0.08);border:none;border-radius:50px;font-size:11px;font-weight:800;color:rgba(255,255,255,0.6);cursor:pointer;text-transform:uppercase;letter-spacing:0.05em;white-space:nowrap;width:100px;height:34px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Manrope',sans-serif}

/* ── MODALS ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-sheet{border-radius:28px;width:100%;max-width:420px;padding:20px;position:relative;background:#161628}
.modal-close{position:absolute;top:16px;right:16px;width:30px;height:30px;background:rgba(255,255,255,0.08);border:none;border-radius:50%;color:rgba(255,255,255,0.7);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-label{font-size:11px;font-weight:800;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px;font-family:'Manrope',sans-serif}
.modal-title{font-size:18px;font-weight:900;color:#fff;text-transform:uppercase;margin-bottom:16px;font-family:'Plus Jakarta Sans',sans-serif}
.modal-item-name{font-size:15px;font-weight:900;color:#fff;text-transform:uppercase;margin-bottom:14px;font-family:'Plus Jakarta Sans',sans-serif}
.m3-input{width:100%;padding:13px 16px;background:rgba(255,255,255,0.06);border:none;border-radius:16px;font-size:14px;font-weight:700;color:#fff;margin-bottom:12px;outline:none;font-family:'Manrope',sans-serif;box-shadow:0 0 0 0 rgba(200,240,74,0)}
.m3-input::placeholder{color:rgba(255,255,255,0.25)}
.m3-input:focus{box-shadow:0 0 0 2px rgba(200,240,74,0.4)}
.cat-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.cpick{padding:0 14px;height:32px;border-radius:8px;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:0.06em;cursor:pointer;color:#0e0e0e;border:2.5px solid transparent;display:inline-flex;align-items:center;font-family:'Manrope',sans-serif}
.cpick.sel{border-color:#fff;box-shadow:0 0 0 1.5px rgba(255,255,255,0.35)}
.photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.photo-slot{aspect-ratio:1;border-radius:16px;background:rgba(255,255,255,0.05);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;overflow:hidden}
.photo-slot img{width:100%;height:100%;object-fit:cover}
.plus-ic{font-size:28px;font-weight:900;color:rgba(255,255,255,0.3)}
.modal-btns{display:flex;gap:8px;margin-top:4px}
.btn-filled{flex:1;padding:14px;background:linear-gradient(135deg,#c8f04a,#a8d020);border:none;border-radius:50px;font-size:13px;font-weight:900;color:#0e0e0e;text-transform:uppercase;letter-spacing:0.05em;cursor:pointer;font-family:'Manrope',sans-serif}
.btn-filled.pink{background:linear-gradient(135deg,#ff6eb4,#e8449a)}
.btn-outlined{flex:1;padding:13px;background:transparent;border:1.5px solid rgba(255,255,255,0.15);border-radius:50px;font-size:13px;font-weight:900;color:#fff;text-transform:uppercase;letter-spacing:0.05em;cursor:pointer;font-family:'Manrope',sans-serif}
.drag-handle{width:36px;height:4px;background:rgba(255,255,255,0.12);border-radius:2px;margin:0 auto 18px}
.mem-cat-badge{font-size:10px;font-weight:800;text-transform:uppercase;padding:3px 10px;border-radius:20px;color:#0e0e0e;display:inline-block;margin-bottom:8px}
.mem-note{font-size:13px;color:rgba(255,255,255,0.5);line-height:1.6;font-weight:600;margin-top:12px;font-family:'Manrope',sans-serif}
.mem-photos{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
.mem-photo{aspect-ratio:1;border-radius:14px;background:rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:center;font-size:28px;overflow:hidden}
.mem-photo img{width:100%;height:100%;object-fit:cover}
.del-confirm-overlay{position:absolute;inset:0;background:rgba(10,10,10,0.88);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;border-radius:20px;z-index:10}
.del-confirm-title{font-size:12px;font-weight:900;color:#fff;text-transform:uppercase;font-family:'Manrope',sans-serif}
.del-confirm-btns{display:flex;gap:8px}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 0;color:rgba(255,255,255,0.2)}
.empty-ic{font-size:36px;margin-bottom:10px}
.empty-tx{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:0.06em;font-family:'Manrope',sans-serif}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#c8f04a;display:inline-block;margin-left:8px;vertical-align:middle;animation:pulse 2s infinite}
.sync-dot.off{background:#ff5c5c;animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* LOGIN */
.login-screen{position:fixed;inset:0;background:#0e0e0e;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 32px;font-family:'Manrope',sans-serif}
.login-stars{position:absolute;inset:0;pointer-events:none}
.login-content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;text-align:center;width:100%;max-width:320px}
.login-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:34px;font-weight:900;color:#fff;letter-spacing:-0.02em;line-height:1.1;margin-bottom:8px}
.login-title span{color:#c8f04a}
.login-sub{font-size:12px;font-weight:700;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:56px}
.login-btn{display:flex;align-items:center;justify-content:center;gap:12px;background:#fff;border:none;border-radius:50px;padding:16px 32px;font-size:15px;font-weight:800;color:#0e0e0e;cursor:pointer;width:100%;-webkit-tap-highlight-color:transparent;touch-action:manipulation;font-family:'Manrope',sans-serif}
.login-btn:active{background:#ebebeb;transform:scale(0.98)}
.login-btn svg{width:20px;height:20px;flex-shrink:0}
.login-hint{font-size:11px;font-weight:700;color:rgba(255,255,255,0.2);text-transform:uppercase;letter-spacing:0.08em;margin-top:20px}
.login-error{font-size:12px;font-weight:800;color:#ff5c5c;margin-top:16px;display:none;text-align:center}
.login-loading{font-size:12px;font-weight:800;color:rgba(255,255,255,0.4);margin-top:16px;display:none;text-transform:uppercase;letter-spacing:0.06em}

/* name edit modal */
.name-modal{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:99998;display:flex;align-items:center;justify-content:center;padding:20px}
.name-sheet{background:#161628;border-radius:24px;padding:24px;width:100%;max-width:360px}
.name-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:900;color:#fff;margin-bottom:16px}
</style>
</head>
<body>
<div id="app">
  <div class="stars" id="stars"></div>
  <div class="screen">

    <!-- HOME PAGE -->
    <div class="page active" id="page-home">
      <div class="home-header">
        <div class="couple-avatars">
          <div class="avatar">🌙</div>
          <div class="avatar">✦</div>
        </div>
        <div class="couple-name" id="couple-name-display">Our Universe</div>
        <button class="edit-name-btn" id="edit-name-btn">✏️</button>
        <span class="sync-dot" id="sync-dot"></span>
      </div>
      <div class="scroll-area">
        <!-- FOR YOU widget -->
        <div class="widget for-you-widget" style="background:linear-gradient(145deg,rgba(200,240,74,0.35),rgba(77,64,255,0.2) 50%,rgba(255,73,219,0.15))">
          <div class="widget-header">
            <div class="widget-title">FOR<br>YOU</div>
          </div>
          <div id="canvas-wrap" style="position:relative;margin:14px;border-radius:16px;overflow:hidden;background:#0e0e1a;height:220px;cursor:crosshair">
            <canvas id="draw-canvas" style="position:absolute;top:0;left:0;width:100%;height:100%;display:block"></canvas>
            <div id="objects-layer" style="position:absolute;inset:0"></div>
          </div>
          <div class="canvas-toolbar">
            <button class="tool-btn active" id="tool-pen" title="Pen" style="border-radius:50%!important;width:48px;height:48px;min-width:48px">
              <svg width="35" height="35" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path fill="none" d="M12 20h9"/><path fill="none" d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
            </button>
            <div id="color-picker-row" style="display:none;align-items:center;gap:8px">
              <button class="color-dot active-dot" data-color="#d9ff5c" style="background:#d9ff5c;border-radius:50%!important" title="Lime"></button>
              <button class="color-dot" data-color="#4d40ff" style="background:#4d40ff;border-radius:50%!important" title="Purple"></button>
              <button class="color-dot" data-color="#ff49db" style="background:#ff49db;border-radius:50%!important" title="Pink"></button>

// ── CANVAS (shared doodle) ──
var canvas=document.getElementById('draw-canvas');
var ctx=canvas.getContext('2d');
var isDrawing=false,lastX=0,lastY=0,currentTool='pen';
var penColor='#d9ff5c';
var canvasW=0;
var saveCanvasTimer=null;
var saveObjectsTimer=null;
var undoStack=[];
var MAX_UNDO=20;
// Objects layer: draggable text/emoji items
var objects=[]; // {id,type,content,x,y,fontSize}
var objIdCounter=0;

function saveToUndoStack(){
  undoStack.push({canvas:canvas.toDataURL(),objects:JSON.parse(JSON.stringify(objects))});
  if(undoStack.length>MAX_UNDO) undoStack.shift();
}

function undo(){
  if(undoStack.length===0) return;
  var prev=undoStack.pop();
  var img=new Image();
  img.onload=function(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img,0,0,canvas.width,canvas.height);
    scheduleSave();
  };
  img.src=prev.canvas;
  objects=prev.objects||[];
  renderObjects();
  scheduleObjectsSave();
}

function initCanvas(){
  var wrap=document.getElementById('canvas-wrap');
  canvasW=wrap.offsetWidth;
  canvas.width=canvasW;
  canvas.height=220;
  canvas.style.width=canvasW+'px';
  canvas.style.height='220px';
  wrap.style.height='220px';
  loadCanvasFromDB();
}

function getPos(e){
  var rect=canvas.getBoundingClientRect();
  var scaleX=canvas.width/rect.width;
  var scaleY=canvas.height/rect.height;
  if(e.touches){
    return{x:(e.touches[0].clientX-rect.left)*scaleX,y:(e.touches[0].clientY-rect.top)*scaleY};
  }
  return{x:(e.clientX-rect.left)*scaleX,y:(e.clientY-rect.top)*scaleY};
}

function startDraw(e){
  if(currentTool!=='pen')return;
  e.preventDefault();
  saveToUndoStack();
  isDrawing=true;
  var pos=getPos(e);lastX=pos.x;lastY=pos.y;
  ctx.beginPath();ctx.moveTo(lastX,lastY);
}
function draw(e){
  if(!isDrawing||currentTool!=='pen')return;
  e.preventDefault();
  var pos=getPos(e);
  ctx.strokeStyle=penColor;
  ctx.lineWidth=4;
  ctx.lineCap='round';
  ctx.lineJoin='round';
  ctx.globalAlpha=1;
  ctx.lineTo(pos.x,pos.y);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(pos.x,pos.y);
  lastX=pos.x;lastY=pos.y;
  scheduleSave();
}
function stopDraw(e){
  if(!isDrawing)return;
  isDrawing=false;
  scheduleSave();
}

function scheduleSave(){
  clearTimeout(saveCanvasTimer);
  saveCanvasTimer=setTimeout(saveCanvasToDB,1000);
}

function saveCanvasToDB(){
  var dataURL=canvas.toDataURL('image/png',0.5);
  canvasRef.set(dataURL);
}

function loadCanvasFromDB(){
  canvasRef.once('value',function(snap){
    var data=snap.val();
    if(data){
      var img=new Image();
      img.onload=function(){ctx.drawImage(img,0,0,canvas.width,canvas.height);};
      img.src=data;
    }
  });
}

canvas.addEventListener('mousedown',startDraw);
canvas.addEventListener('mousemove',draw);
canvas.addEventListener('mouseup',stopDraw);
canvas.addEventListener('mouseleave',stopDraw);
canvas.addEventListener('touchstart',startDraw,{passive:false});
canvas.addEventListener('touchmove',draw,{passive:false});
canvas.addEventListener('touchend',stopDraw,{passive:false});

document.getElementById('canvas-clear-btn').onclick=function(){
  saveToUndoStack();
  ctx.clearRect(0,0,canvas.width,canvas.height);
  objects=[];

  db.ref('canvas_objects').set(null);
};

  var emojis=['🩷','😍','🥰','😘','😊','😢','😭','😅','🤭','🫶','💫','✨','🌙','🌸','🎉','💌','🔥','🌈'];

  pop.innerHTML=emojis.map(function(e){
    return '<button data-emoji="'+e+'" style="width:42px;height:42px;border:none;background:rgba(255,255,255,0.06);border-radius:10px;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center">'+e+'</button>';
  }).join('');
  toolbarEl.style.position='relative';
  toolbarEl.appendChild(pop);
  pop.querySelectorAll('button').forEach(function(btn){
    btn.addEventListener('click',function(e){
      e.stopPropagation();
      var emoji=btn.getAttribute('data-emoji');
      saveToUndoStack();
      var wrap=document.getElementById('canvas-wrap');
      var obj={id:objIdCounter++,type:'emoji',content:emoji,x:wrap.offsetWidth/2-20,y:wrap.offsetHeight/2-20,fontSize:40};

    document.addEventListener('click',function closePop(e){

setTimeout(function(){
  initCanvas();
  var cpr=document.getElementById('color-picker-row');
  if(cpr)cpr.style.display='flex';
},300);

function scheduleObjectsSave(){
  clearTimeout(saveObjectsTimer);
  saveObjectsTimer=setTimeout(function(){
    db.ref('canvas_objects').set(objects.length>0?objects:null);
  },800);
}

function renderObjects(){
  var layer=document.getElementById('objects-layer');
  if(!layer)return;
  layer.innerHTML='';
  objects.forEach(function(obj){
    var el=document.createElement('div');
    el.style.cssText='position:absolute;left:'+obj.x+'px;top:'+obj.y+'px;font-size:'+obj.fontSize+'px;cursor:grab;user-select:none;touch-action:none;line-height:1.2;'+(obj.type==='text'?'color:#fff;font-family:Plus Jakarta Sans,sans-serif;font-weight:700;white-space:nowrap;text-shadow:0 1px 4px rgba(0,0,0,0.8)':'');
    el.textContent=obj.content;
    el.dataset.id=obj.id;
    makeDraggable(el,obj);
    layer.appendChild(el);
  });
}

function makeDraggable(el,obj){
  var startX=0,startY=0,startObjX=0,startObjY=0,dragging=false,hasMoved=false;
  function onStart(cx,cy){
    dragging=true;hasMoved=false;
    startX=cx;startY=cy;
    startObjX=obj.x;startObjY=obj.y;
    el.style.cursor='grabbing';
    el.style.zIndex='10';
  }
  function onMove(cx,cy){
    if(!dragging)return;
    var dx=cx-startX,dy=cy-startY;
    if(Math.abs(dx)>3||Math.abs(dy)>3)hasMoved=true;
    var wrap=document.getElementById('canvas-wrap');
    obj.x=Math.max(0,Math.min(startObjX+dx,wrap.offsetWidth-el.offsetWidth));
    obj.y=Math.max(0,Math.min(startObjY+dy,wrap.offsetHeight-el.offsetHeight));
    el.style.left=obj.x+'px';
    el.style.top=obj.y+'px';
  }
  function onEnd(){
    if(!dragging)return;
    dragging=false;
    el.style.cursor='grab';
    el.style.zIndex='';
    if(hasMoved)scheduleObjectsSave();
  }
  el.addEventListener('touchstart',function(e){e.preventDefault();onStart(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
  el.addEventListener('touchmove',function(e){e.preventDefault();onMove(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
  el.addEventListener('touchend',function(e){e.preventDefault();onEnd();},{passive:false});
  el.addEventListener('mousedown',function(e){e.preventDefault();onStart(e.clientX,e.clientY);});
  document.addEventListener('mousemove',function(e){if(dragging)onMove(e.clientX,e.clientY);});
  document.addEventListener('mouseup',function(){if(dragging)onEnd();});
}

// Load saved objects from Firebase
db.ref('canvas_objects').on('value',function(snap){
  var data=snap.val();
  if(data&&Array.isArray(data)){
    objects=data;
    renderObjects();
  }
});

// ── LIST PAGE ──
function renderList(){
  var f=homeCat==='All'?items:items.filter(function(x){return x.cat===homeCat;});
  var todo=f.filter(function(x){return !x.done;}),done=f.filter(function(x){return x.done;});
  document.getElementById('home-cats').innerHTML=CATS.map(function(c){return chipHTML(c,homeCat===c);}).join('');
  bindCatClicks('home-cats',function(c){homeCat=c;openDeleteId=null;renderList();});
  document.getElementById('list-todo').innerHTML=todo.length?todo.map(itemHTML).join(''):'<div style="text-align:center;padding:24px 0;font-size:12px;font-weight:800;color:rgba(255,255,255,0.18);text-transform:uppercase;letter-spacing:0.06em;font-family:Manrope,sans-serif">no ideas yet ✦</div>';
  document.getElementById('list-done').innerHTML=done.map(itemHTML).join('');
  document.getElementById('sec-done').style.display=done.length?'block':'none';
  bindItemEvents();
}

function chipHTML(c,active){
  if(active){var col=CHIP_ACTIVE[c]||{bg:'#c8f04a',text:'#0e0e0e'};return '<button class="cat active" style="background:'+col.bg+';color:'+col.text+'" data-cat="'+c+'">'+c+'</button>';}
  return '<button class="cat inactive" data-cat="'+c+'">'+c+'</button>';
}
function bindCatClicks(id,fn){
  var el=document.getElementById(id);if(!el)return;
  el.querySelectorAll('.cat').forEach(function(b){b.addEventListener('click',function(){fn(b.getAttribute('data-cat'));});});
}

function itemHTML(item){
  var c=CC[item.cat]||'#fff',isOpen=openDeleteId===item.id;
  var h='<div class="item-wrap" id="wrap-'+item.id+'">';
  if(isOpen)h+='<div class="delete-menu"><button class="del-btn confirm" data-delid="'+item.id+'">Delete</button><button class="del-btn cancel-del">Cancel</button></div>';
  h+='<div class="item'+(item.done?' done':'')+'" id="item-'+item.id+'">';
  h+='<div class="checkbox'+(item.done?' checked':'')+'" style="'+(item.done?'background:'+c+';border:none':'')+'" data-check="'+item.id+'">';
  if(item.done)h+='<svg width="13" height="13" viewBox="0 0 14 14" fill="none" style="pointer-events:none"><path d="M2.5 7L5.5 10L11.5 4" stroke="#0e0e0e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  h+='</div><span class="item-text" style="color:'+(item.done?'rgba(255,255,255,0.25)':'#fff')+(item.done?';text-decoration:line-through':'')+'">'+(item.title||'')+'</span>';
  h+='<div class="item-cat-dot" style="background:'+c+'"></div></div></div>';
  return h;
}

function bindItemEvents(){
  document.querySelectorAll('[data-check]').forEach(function(el){
    el.addEventListener('click',function(e){e.stopPropagation();onCheck(el.getAttribute('data-check'));});
    el.addEventListener('pointerdown',function(e){e.stopPropagation();});
    el.addEventListener('pointerup',function(e){e.stopPropagation();});
  });
  document.querySelectorAll('.item').forEach(function(el){
    var id=el.id.replace('item-','');
    el.addEventListener('pointerdown',function(){startHold(id,el);});
    el.addEventListener('pointerup',endHold);
    el.addEventListener('pointerleave',endHold);
    el.addEventListener('contextmenu',function(e){e.preventDefault();});
  });
  document.querySelectorAll('.del-btn.confirm').forEach(function(btn){
    btn.addEventListener('click',function(){removeItem(btn.getAttribute('data-delid'));openDeleteId=null;});
  });
  document.querySelectorAll('.del-btn.cancel-del').forEach(function(btn){
    btn.addEventListener('click',function(){openDeleteId=null;renderList();});
  });
}

function startHold(id,el){el.classList.add('pressing');holdTimer=setTimeout(function(){openDeleteId=id;renderList();},500);}
function endHold(){clearTimeout(holdTimer);document.querySelectorAll('.item.pressing').forEach(function(el){el.classList.remove('pressing');});}
function onCheck(id){var item=items.find(function(x){return x.id===id;});if(!item)return;if(!item.done)openDoneModal(item);}

document.getElementById('add-btn-el').addEventListener('click',openAddModal);
document.getElementById('mode-toggle-btn').addEventListener('click',toggleMode);

// ── MEMORY PAGE ──
function renderMem(){
  var memories=items.filter(function(x){return x.done;});
  var f=memCat==='All'?memories:memories.filter(function(x){return x.cat===memCat;});
  document.getElementById('mem-cats').innerHTML=CATS.map(function(c){return chipHTML(c,memCat===c);}).join('');
  bindCatClicks('mem-cats',function(c){memCat=c;renderMem();});
  document.getElementById('mode-label').textContent=memMode==='card'?'Board Mode':'Card Mode';
  var scrollArea=document.getElementById('mem-scroll-area'),va=document.getElementById('mem-view');
  if(f.length===0){scrollArea.style.overflow='hidden';va.style.cssText='height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center';va.innerHTML='<div class="empty-state"><div class="empty-ic">✦</div><div class="empty-tx">No memories yet</div></div>';return;}
  if(memMode==='card'){
    scrollArea.style.overflow='hidden';
    va.style.cssText='height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding-bottom:50px';
    if(typeof window._cardIdx==='undefined'||window._cardIdx>=f.length)window._cardIdx=0;
    var visCards=[];for(var k=0;k<Math.min(3,f.length);k++)visCards.push(f[(window._cardIdx+k)%f.length]);
    va.innerHTML='<div class="card-stack" id="cstack">'+visCards.map(function(m,si){
      var tf=si===0?'transform:translateX(-50%) rotate(-4deg);top:20px':si===1?'transform:translateX(-46%) rotate(3deg);top:10px':'transform:translateX(-54%) rotate(-1.5deg);top:0';
      return '<div class="polaroid" data-memid="'+m.id+'" style="z-index:'+(si+1)+';'+tf+'">'
        +'<div class="polaroid-img">'+(m.photos&&m.photos[0]?'<img src="'+m.photos[0]+'"/>':memEmoji(m.cat))+'</div>'
        +'<div class="polaroid-title">'+(m.title||'')+'</div>'
        +'<div class="polaroid-date">'+(m.date||'')+'</div>'
        +'<div class="polaroid-cat" style="background:'+(CC[m.cat]||'#fff')+'">'+m.cat+'</div></div>';
    }).join('')+'</div><div class="stack-hint">'+(window._cardIdx+1)+' / '+f.length+' · swipe to browse</div>';
    attachSwipe(f);
  } else {
    scrollArea.style.overflow='auto';va.style.cssText='padding:4px 0 20px';
    va.innerHTML='<div class="grid-view">'+f.map(function(m){
      return '<div class="grid-card" data-memid="'+m.id+'"><div class="grid-img">'+(m.photos&&m.photos[0]?'<img src="'+m.photos[0]+'"/>':memEmoji(m.cat))+'</div>'
        +'<div class="grid-body"><div class="grid-title">'+(m.title||'')+'</div><div class="grid-date">'+(m.date||'')+'</div></div></div>';
    }).join('')+'</div>';
  }
  va.querySelectorAll('[data-memid]').forEach(function(el){
    var id=el.getAttribute('data-memid'),moved=false;
    el.addEventListener('pointerdown',function(){moved=false;el.style.opacity='0.8';holdTimer=setTimeout(function(){el.style.opacity='1';showMemDeleteConfirm(el,id);},600);});
    el.addEventListener('pointermove',function(){moved=true;clearTimeout(holdTimer);el.style.opacity='1';});
    el.addEventListener('pointerup',function(){clearTimeout(holdTimer);el.style.opacity='1';if(!moved&&!el.querySelector('.del-confirm-overlay'))openMemDetail(id);});
    el.addEventListener('pointerleave',function(){clearTimeout(holdTimer);el.style.opacity='1';});
    el.addEventListener('contextmenu',function(e){e.preventDefault();});
  });
}

function attachSwipe(f){
  var stack=document.getElementById('cstack');if(!stack)return;
  var topCard=stack.querySelector('.polaroid:last-child');if(!topCard)return;
  var startX=0,startY=0,dragging=false,hasMoved=false,lpt=null;
  function onStart(x,y){startX=x;startY=y;dragging=true;hasMoved=false;topCard.style.transition='none';lpt=setTimeout(function(){if(!hasMoved){dragging=false;showMemDeleteConfirm(topCard,topCard.getAttribute('data-memid'));}},600);}
  function onMove(x,y){if(!dragging)return;var dx=x-startX,dy=y-startY;if(Math.abs(dx)>6||Math.abs(dy)>6){hasMoved=true;clearTimeout(lpt);}if(!hasMoved)return;topCard.style.transform='translateX('+dx+'px) translateY('+(dy*0.25)+'px) rotate('+(-1.5+dx*0.07)+'deg)';}
  function onEnd(x){if(!dragging)return;dragging=false;clearTimeout(lpt);var dx=x-startX;if(hasMoved&&Math.abs(dx)>70){topCard.style.transition='transform 0.3s ease,opacity 0.3s ease';topCard.style.transform='translateX('+(dx>0?600:-600)+'px) rotate('+(dx>0?30:-30)+'deg)';topCard.style.opacity='0';window._cardIdx=(window._cardIdx+1)%f.length;setTimeout(renderMem,300);}else{topCard.style.transition='transform 0.25s ease';topCard.style.transform='translateX(-54%) rotate(-1.5deg)';if(!hasMoved){var id=topCard.getAttribute('data-memid');if(id)openMemDetail(id);}}}
  topCard.addEventListener('touchstart',function(e){e.preventDefault();onStart(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
  topCard.addEventListener('touchmove',function(e){e.preventDefault();onMove(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
  topCard.addEventListener('touchend',function(e){e.preventDefault();onEnd(e.changedTouches[0].clientX);},{passive:false});
  topCard.addEventListener('mousedown',function(e){e.preventDefault();onStart(e.clientX,e.clientY);});
  document.addEventListener('mousemove',function(e){if(dragging)onMove(e.clientX,e.clientY);});
  document.addEventListener('mouseup',function(e){if(dragging)onEnd(e.clientX);});
}

function showMemDeleteConfirm(el,id){
  var existing=el.querySelector('.del-confirm-overlay');if(existing){existing.remove();return;}
  var ov=document.createElement('div');ov.className='del-confirm-overlay';
  ov.innerHTML='<div class="del-confirm-title">delete memory?</div><div class="del-confirm-btns"><button class="del-btn confirm" id="dco-yes">Delete</button><button class="del-btn cancel-del" id="dco-no">Cancel</button></div>';
  el.appendChild(ov);
  ov.querySelector('#dco-yes').addEventListener('click',function(e){e.stopPropagation();removeItem(id);});
  ov.querySelector('#dco-no').addEventListener('click',function(e){e.stopPropagation();ov.remove();});
}

function memEmoji(cat){return{Travel:'⛩️',Food:'🍣',Fun:'🎤',Romance:'🌉',Adventure:'🌌',Other:'✨'}[cat]||'✨';}
function toggleMode(){memMode=memMode==='card'?'grid':'card';renderMem();}

// ── MODALS ──
function catPickerHTML(){
  return Object.keys(CC).map(function(c){return '<div class="cpick'+(newCat===c?' sel':'')+'" style="background:'+CC[c]+'" data-pickcat="'+c+'">'+c+'</div>';}).join('');
}
function bindPickerClicks(){
  document.querySelectorAll('[data-pickcat]').forEach(function(el){
    el.addEventListener('click',function(){newCat=el.getAttribute('data-pickcat');document.querySelectorAll('[data-pickcat]').forEach(function(e){e.classList.toggle('sel',e.getAttribute('data-pickcat')===newCat);});});
  });
}

function openAddModal(){
  document.getElementById('modal-container').innerHTML=
    '<div class="modal-overlay" id="mov"><div class="modal-sheet"><div class="drag-handle"></div>'
    +'<div class="modal-title">new dream ✦</div>'
    +'<input class="m3-input" id="ni" placeholder="what do you want to do together?"/>'
    +'<div class="cat-row">'+catPickerHTML()+'</div>'
    +'<div class="modal-btns"><button class="btn-filled" id="btn-add-item">Add to list +</button><button class="btn-outlined" id="btn-cancel-add">Cancel</button></div>'
    +'</div></div>';
  bindPickerClicks();
  document.getElementById('btn-add-item').addEventListener('click',addItem);
  document.getElementById('btn-cancel-add').addEventListener('click',closeModal);
  document.getElementById('mov').addEventListener('click',function(e){if(e.target.id==='mov')closeModal();});
  document.getElementById('ni').addEventListener('keydown',function(e){if(e.key==='Enter')addItem();});
  setTimeout(function(){var ni=document.getElementById('ni');if(ni)ni.focus();},50);
}

function openDoneModal(item){
  tempPhotos=[];
  document.getElementById('modal-container').innerHTML=
    '<div class="modal-overlay" id="mov"><div class="modal-sheet" style="position:relative">'
    +'<button class="modal-close" id="btn-close-done">✕</button>'
    +'<div class="modal-label">you did it! 🎉</div>'
    +'<div class="modal-item-name">'+(item.title||'')+'</div>'
    +'<div class="photo-grid" id="pgrid">'+photoSlots()+'</div>'
    +'<input class="m3-input" id="note-in" placeholder="write a memory note..."/>'
    +'<div class="modal-btns"><button class="btn-filled pink" id="btn-confirm-done">We\'ve done it!</button><button class="btn-outlined" id="btn-cancel-done">Cancel</button></div>'
    +'</div></div>';
  document.getElementById('btn-close-done').addEventListener('click',closeModal);
  document.getElementById('btn-cancel-done').addEventListener('click',closeModal);
  document.getElementById('btn-confirm-done').addEventListener('click',function(){confirmDone(item.id);});
  document.getElementById('mov').addEventListener('click',function(e){if(e.target.id==='mov')closeModal();});
  bindPhotoSlots();
}

function openMemDetail(id){
  var m=items.find(function(x){return x.id===id;});if(!m)return;
  var c=CC[m.cat]||'#fff',photos=m.photos||[];
  document.getElementById('modal-container').innerHTML=
    '<div class="modal-overlay" id="mov"><div class="modal-sheet" style="position:relative">'
    +'<button class="modal-close" id="btn-close-mem">✕</button>'
    +'<span class="mem-cat-badge" style="background:'+c+'">'+m.cat+'</span>'
    +'<div class="modal-title" style="margin-bottom:4px">'+(m.title||'')+'</div>'
    +'<div style="font-size:11px;font-weight:700;color:rgba(255,255,255,0.3);margin-bottom:14px;text-transform:uppercase;letter-spacing:0.08em">'+(m.date||'')+'</div>'
    +'<div class="mem-photos">'
    +(photos.length>0?photos.map(function(p){return '<div class="mem-photo"><img src="'+p+'"/></div>';}).join('')
      :[memEmoji(m.cat),'📸','📸','📸'].map(function(e){return '<div class="mem-photo">'+e+'</div>';}).join(''))
    +'</div>'+(m.note?'<div class="mem-note">'+m.note+'</div>':'')
    +'</div></div>';
  document.getElementById('btn-close-mem').addEventListener('click',closeModal);
  document.getElementById('mov').addEventListener('click',function(e){if(e.target.id==='mov')closeModal();});
}

function photoSlots(){
  var h='';
  for(var i=0;i<4;i++){
    if(i<tempPhotos.length)h+='<div class="photo-slot"><img src="'+tempPhotos[i]+'"/></div>';
    else if(i===tempPhotos.length)h+='<label class="photo-slot" data-photoidx="'+i+'"><input type="file" accept="image/*" style="display:none"/><div class="plus-ic">+</div></label>';
    else h+='<div class="photo-slot"></div>';
  }
  return h;
}
function bindPhotoSlots(){
  document.querySelectorAll('[data-photoidx]').forEach(function(label){
    var idx=parseInt(label.getAttribute('data-photoidx')),input=label.querySelector('input[type=file]');
    if(input)input.addEventListener('change',function(){var file=input.files[0];if(!file)return;var r=new FileReader();r.onload=function(e){tempPhotos[idx]=e.target.result;document.getElementById('pgrid').innerHTML=photoSlots();bindPhotoSlots();};r.readAsDataURL(file);});
  });
}

function confirmDone(id){
  var item=items.find(function(x){return x.id===id;});if(!item)return;
  var note=(document.getElementById('note-in')||{}).value||'';
  var date=new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  saveItem(Object.assign({},item,{done:true,photos:tempPhotos.slice(),note:note,date:date}));
  closeModal();
}

function addItem(){
  var ni=document.getElementById('ni'),t=ni?ni.value.trim():'';
  if(!t)return;
  newItem({title:t,cat:newCat,done:false,photos:[],note:'',date:''});
  closeModal();
}

function closeModal(){document.getElementById('modal-container').innerHTML='';}
</script>
