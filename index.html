<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Our Universe ✦</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:#0a0a0a;display:flex;align-items:center;justify-content:center}
  body{font-family:system-ui,-apple-system,sans-serif}
  .phone{width:100%;max-width:390px;height:100dvh;max-height:780px;background:#0a0a0a;border-radius:40px;overflow:hidden;position:relative}
  .stars{position:absolute;inset:0;pointer-events:none;z-index:0}
  .star{position:absolute;background:#fff;border-radius:50%}
  .screen{position:relative;z-index:1;height:100%;display:flex;flex-direction:column;overflow:hidden}
  .page{display:none;flex-direction:column;flex:1;overflow:hidden}
  .page.active{display:flex}
  .fixed-top{flex-shrink:0;padding:0 20px;background:#0a0a0a;z-index:20}
  .header{padding:52px 0 14px;display:flex;justify-content:space-between;align-items:flex-end}
  .header-sub{font-size:11px;font-weight:800;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:5px}
  .header-title{font-size:26px;font-weight:900;color:#fff;line-height:1.15;letter-spacing:-0.02em}
  .header-title span{color:#e8f04a}
  .mode-toggle{background:rgba(255,255,255,0.08);border:none;border-radius:50px;font-size:11px;font-weight:800;color:rgba(255,255,255,0.6);cursor:pointer;text-transform:uppercase;letter-spacing:0.05em;white-space:nowrap;transition:background 0.15s,color 0.15s;width:100px;height:34px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .mode-toggle:hover{background:rgba(255,255,255,0.14);color:#fff}
  .cats-sticky{padding:10px 20px 12px;background:#0a0a0a;z-index:20;flex-shrink:0}
  .cats{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none}
  .cats::-webkit-scrollbar{display:none}
  .cat{flex-shrink:0;height:32px;padding:0 16px;border-radius:8px;font-size:12px;font-weight:800;cursor:pointer;text-transform:uppercase;letter-spacing:0.06em;outline:none;border:none;display:inline-flex;align-items:center;transition:background 0.15s,color 0.15s}
  .cat.inactive{background:#1e1e30;color:rgba(255,255,255,0.45)}
  .cat.inactive:hover{background:#26263c;color:rgba(255,255,255,0.7)}
  .cat.active{color:#0a0a0a}
  .scroll-area{flex:1;overflow-y:auto;padding:0 20px 100px;scrollbar-width:none}
  .scroll-area::-webkit-scrollbar{display:none}
  .add-btn{width:100%;padding:16px 20px;background:#4040e0;border-radius:22px;border:none;display:flex;align-items:center;gap:12px;cursor:pointer;margin-bottom:14px;transition:all 0.15s}
  .add-btn:active{transform:scale(0.98)}
  .add-icon{width:30px;height:30px;background:#e8f04a;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#0a0a0a;flex-shrink:0}
  .add-label{font-size:14px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:0.05em}
  .section-label{font-size:11px;font-weight:800;color:rgba(255,255,255,0.25);text-transform:uppercase;letter-spacing:0.1em;margin:16px 0 8px}
  .item-wrap{position:relative;margin-bottom:8px}
  .item{width:100%;padding:14px 16px;border-radius:22px;border:none;display:flex;align-items:center;gap:12px;text-align:left;background:#111120;transition:transform 0.15s,background 0.15s;cursor:default;user-select:none}
  .item.done{background:rgba(255,255,255,0.03)}
  .item.pressing{transform:scale(0.97);background:#1e1e30}
  .checkbox{width:24px;height:24px;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,0.18);cursor:pointer;transition:all 0.15s}
  .checkbox.checked{border:none}
  .item-text{font-size:14px;font-weight:800;text-transform:uppercase;letter-spacing:0.02em;flex:1}
  .item-cat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
  .delete-menu{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#1e1e30;border-radius:16px;border:1px solid rgba(255,255,255,0.08);padding:6px;display:flex;gap:6px;z-index:100;white-space:nowrap}
  .del-btn{padding:10px 18px;border-radius:12px;font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:0.05em;cursor:pointer;border:none;transition:all 0.12s}
  .del-btn.confirm{background:#ff5c5c;color:#fff}
  .del-btn.cancel-del{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.6)}
  .delete-menu::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:#1e1e30}
  .card-stack{position:relative;width:100%;height:380px}
  .polaroid{position:absolute;width:270px;left:50%;background:#f5f0e8;border-radius:20px;padding:12px 12px 44px;cursor:pointer;transition:transform 0.2s}
  .polaroid:nth-child(1){transform:translateX(-50%) rotate(-4deg);z-index:1;top:20px}
  .polaroid:nth-child(2){transform:translateX(-46%) rotate(3deg);z-index:2;top:10px}
  .polaroid:nth-child(3){transform:translateX(-54%) rotate(-1.5deg);z-index:3;top:0}
  .polaroid:nth-child(3):hover{transform:translateX(-54%) rotate(-1.5deg) scale(1.02)}
  .polaroid-img{width:100%;aspect-ratio:1;border-radius:10px;background:#d8d0c0;display:flex;align-items:center;justify-content:center;font-size:44px;margin-bottom:10px;overflow:hidden}
  .polaroid-img img{width:100%;height:100%;object-fit:cover;border-radius:10px}
  .polaroid-title{font-size:14px;font-weight:900;color:#1a1208;text-transform:uppercase;letter-spacing:-0.01em;margin-bottom:2px}
  .polaroid-date{font-size:11px;color:#7a6a50;font-weight:600}
  .polaroid-cat{position:absolute;bottom:12px;right:12px;font-size:10px;font-weight:800;text-transform:uppercase;padding:3px 8px;border-radius:20px;color:#0a0a0a}
  .stack-hint{font-size:11px;font-weight:800;color:rgba(255,255,255,0.2);text-transform:uppercase;letter-spacing:0.08em;margin-top:16px}
  .grid-view{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .grid-card{background:#111120;border-radius:20px;overflow:hidden;cursor:pointer;transition:all 0.15s}
  .grid-card:active{transform:scale(0.97)}
  .grid-img{width:100%;aspect-ratio:1;background:#161625;display:flex;align-items:center;justify-content:center;font-size:30px;overflow:hidden}
  .grid-img img{width:100%;height:100%;object-fit:cover}
  .grid-body{padding:10px 12px 12px}
  .grid-title{font-size:12px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:0.02em;margin-bottom:3px}
  .grid-date{font-size:10px;color:rgba(255,255,255,0.3);font-weight:600}
  .nav{position:absolute;bottom:18px;left:16px;right:16px;background:#4040e0;border-radius:100px;display:flex;align-items:center;padding:5px;z-index:50;height:58px}
  .nav-btn{flex:1;height:100%;border:none;background:transparent;border-radius:100px;font-size:15px;font-weight:900;cursor:pointer;text-transform:uppercase;letter-spacing:0.04em;color:#fff;padding:0;display:flex;align-items:center;justify-content:center;transition:background 0.18s,color 0.18s}
  .nav-btn.active{background:#e8f04a;color:#0a0a0a}
  .modal-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.75);z-index:200;display:flex;align-items:center;justify-content:center;border-radius:40px;padding:20px}
  .modal-sheet{border-radius:28px;width:100%;padding:20px;position:relative;background:#111120}
  .modal-close{position:absolute;top:16px;right:16px;width:30px;height:30px;background:rgba(255,255,255,0.08);border:none;border-radius:50%;color:rgba(255,255,255,0.7);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .modal-label{font-size:11px;font-weight:800;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px}
  .modal-title{font-size:18px;font-weight:900;color:#fff;text-transform:uppercase;letter-spacing:-0.01em;margin-bottom:16px}
  .modal-item-name{font-size:15px;font-weight:900;color:#fff;text-transform:uppercase;margin-bottom:14px}
  .m3-input{width:100%;padding:13px 16px;background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.1);border-radius:16px;font-size:14px;font-weight:700;color:#fff;margin-bottom:12px;outline:none;font-family:inherit}
  .m3-input::placeholder{color:rgba(255,255,255,0.25)}
  .m3-input:focus{border-color:#e8f04a}
  .cat-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .cpick{padding:0 14px;height:32px;border-radius:8px;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:0.06em;cursor:pointer;transition:all 0.12s;color:#0a0a0a;border:2.5px solid transparent;display:inline-flex;align-items:center}
  .cpick.sel{border-color:#fff;box-shadow:0 0 0 1.5px rgba(255,255,255,0.35)}
  .photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
  .photo-slot{aspect-ratio:1;border-radius:16px;background:rgba(255,255,255,0.05);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;overflow:hidden}
  .photo-slot img{width:100%;height:100%;object-fit:cover}
  .plus-ic{font-size:28px;font-weight:900;color:rgba(255,255,255,0.3);line-height:1}
  .modal-btns{display:flex;gap:8px;margin-top:4px}
  .btn-filled{flex:1;padding:14px;background:#e8f04a;border:none;border-radius:50px;font-size:13px;font-weight:900;color:#0a0a0a;text-transform:uppercase;letter-spacing:0.05em;cursor:pointer}
  .btn-filled.pink{background:#ff6eb4}
  .btn-outlined{flex:1;padding:13px;background:transparent;border:1.5px solid rgba(255,255,255,0.2);border-radius:50px;font-size:13px;font-weight:900;color:#fff;text-transform:uppercase;letter-spacing:0.05em;cursor:pointer}
  .drag-handle{width:36px;height:4px;background:rgba(255,255,255,0.12);border-radius:2px;margin:0 auto 18px}
  .mem-cat-badge{font-size:10px;font-weight:800;text-transform:uppercase;padding:3px 10px;border-radius:20px;color:#0a0a0a;display:inline-block;margin-bottom:8px}
  .mem-note{font-size:13px;color:rgba(255,255,255,0.5);line-height:1.6;font-weight:600;margin-top:12px}
  .mem-photos{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
  .mem-photo{aspect-ratio:1;border-radius:14px;background:rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:center;font-size:28px;overflow:hidden}
  .mem-photo img{width:100%;height:100%;object-fit:cover}
  .empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:rgba(255,255,255,0.2)}
  .empty-ic{font-size:36px;margin-bottom:10px}
  .empty-tx{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:0.06em}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:#e8f04a;display:inline-block;margin-left:8px;vertical-align:middle;animation:pulse 2s infinite}
  .sync-dot.off{background:#ff5c5c;animation:none}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
</style>
</head>
<body>
<div class="phone">
  <div class="stars" id="stars"></div>
  <div class="screen">

    <!-- HOME -->
    <div class="page active" id="page-home">
      <div class="fixed-top">
        <div class="header">
          <div>
            <div class="header-sub">our bucket list <span class="sync-dot" id="sync-dot"></span></div>
            <div class="header-title">welcome to<br>our <span>universe</span> ✦</div>
          </div>
        </div>
      </div>
      <div class="cats-sticky"><div class="cats" id="home-cats"></div></div>
      <div class="scroll-area">
        <button class="add-btn" onclick="openAddModal()">
          <div class="add-icon">+</div>
          <span class="add-label">new idea</span>
        </button>
        <div class="section-label">to do</div>
        <div id="list-todo"></div>
        <div class="section-label" id="sec-done" style="display:none">done ✓</div>
        <div id="list-done"></div>
      </div>
    </div>

    <!-- MEMORY -->
    <div class="page" id="page-memory">
      <div class="fixed-top">
        <div class="header">
          <div>
            <div class="header-sub">our memories</div>
            <div class="header-title">done <span>together</span> ✦</div>
          </div>
          <button class="mode-toggle" onclick="toggleMode()"><span id="mode-label">Board Mode</span></button>
        </div>
      </div>
      <div class="cats-sticky"><div class="cats" id="mem-cats"></div></div>
      <div class="scroll-area" id="mem-scroll-area"><div id="mem-view"></div></div>
    </div>

    <div class="nav">
      <button class="nav-btn active" id="nav-home" onclick="switchPage('home')">Home</button>
      <button class="nav-btn" id="nav-mem" onclick="switchPage('memory')">Memory</button>
    </div>
    <div id="modal-container"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set, remove, push, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBK7lq8QTMHFhx-d2GekIR1u4WAR_sASvU",
  authDomain: "our-universe-7078d.firebaseapp.com",
  databaseURL: "https://our-universe-7078d-default-rtdb.firebaseio.com",
  projectId: "our-universe-7078d",
  storageBucket: "our-universe-7078d.firebasestorage.app",
  messagingSenderId: "790066125607",
  appId: "1:790066125607:web:2c41a381f1b594351b6702"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const itemsRef = ref(db, 'items');

const CC={Travel:'#5ee7ff',Food:'#ff9f4a',Fun:'#ff6eb4',Romance:'#bf94ff',Adventure:'#e8f04a',Other:'#ff5c5c'};
const CHIP_ACTIVE={All:{bg:'#e8f04a',text:'#0a0a0a'},Travel:{bg:'#5ee7ff',text:'#0a0a0a'},Food:{bg:'#ff9f4a',text:'#0a0a0a'},Fun:{bg:'#ff6eb4',text:'#0a0a0a'},Romance:{bg:'#bf94ff',text:'#0a0a0a'},Adventure:{bg:'#e8f04a',text:'#0a0a0a'},Other:{bg:'#ff5c5c',text:'#0a0a0a'}};
const CATS=['All','Travel','Food','Fun','Romance','Adventure'];

let items=[];
let homeCat='All',memCat='All',memMode='card',newCat='Adventure',tempPhotos=[],openDeleteId=null,holdTimer=null;

// stars
for(let i=0;i<80;i++){
  const s=document.createElement('div');s.className='star';
  const sz=Math.random()*1.8+0.4;
  s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;opacity:${Math.random()*0.35+0.1}`;
  document.getElementById('stars').appendChild(s);
}

// live sync from Firebase
onValue(itemsRef, (snapshot) => {
  const data = snapshot.val();
  items = data ? Object.entries(data).map(([id,v])=>({...v,id})) : [];
  document.getElementById('sync-dot').classList.remove('off');
  if(document.getElementById('page-home').classList.contains('active')) renderHome();
  else renderMem();
}, (error) => {
  document.getElementById('sync-dot').classList.add('off');
});

function saveItem(item){
  const {id, ...data} = item;
  set(ref(db, 'items/'+id), data);
}

function removeItem(id){
  remove(ref(db, 'items/'+id));
}

function newItem(data){
  push(itemsRef, data);
}

function chipHTML(c,active,fn){
  if(active){const col=CHIP_ACTIVE[c]||{bg:'#e8f04a',text:'#0a0a0a'};return `<button class="cat active" style="background:${col.bg};color:${col.text}" onclick="${fn}">${c}</button>`;}
  return `<button class="cat inactive" onclick="${fn}">${c}</button>`;
}

window.switchPage = function(p){
  document.getElementById('page-home').classList.toggle('active',p==='home');
  document.getElementById('page-memory').classList.toggle('active',p==='memory');
  document.getElementById('nav-home').classList.toggle('active',p==='home');
  document.getElementById('nav-mem').classList.toggle('active',p==='memory');
  openDeleteId=null;
  if(p==='memory') renderMem(); else renderHome();
};

function renderHome(){
  const f=homeCat==='All'?items:items.filter(x=>x.cat===homeCat);
  const todo=f.filter(x=>!x.done),done=f.filter(x=>x.done);
  document.getElementById('home-cats').innerHTML=CATS.map(c=>chipHTML(c,homeCat===c,`setHomeCat('${c}')`)).join('');
  document.getElementById('list-todo').innerHTML=todo.length?todo.map(itemHTML).join(''):`<div style="text-align:center;padding:24px 0;font-size:12px;font-weight:800;color:rgba(255,255,255,0.18);text-transform:uppercase;letter-spacing:0.06em">no ideas yet ✦</div>`;
  document.getElementById('list-done').innerHTML=done.map(itemHTML).join('');
  document.getElementById('sec-done').style.display=done.length?'block':'none';
}

function itemHTML(item){
  const c=CC[item.cat]||'#fff';
  const isOpen=openDeleteId===item.id&&!item.done;
  return `<div class="item-wrap" id="wrap-${item.id}">
    ${isOpen?`<div class="delete-menu">
      <button class="del-btn confirm" onclick="deleteItem('${item.id}')">Delete</button>
      <button class="del-btn cancel-del" onclick="cancelDelete()">Cancel</button>
    </div>`:''}
    <div class="item ${item.done?'done':''}" id="item-${item.id}"
      onpointerdown="${!item.done?`startHold('${item.id}',event)`:''}"
      onpointerup="${!item.done?`endHold()`:''}"
      onpointerleave="${!item.done?`endHold()`:''}"
      oncontextmenu="return false">
      <div class="checkbox ${item.done?'checked':''}" style="${item.done?`background:${c};border:none`:''}" onclick="onCheck('${item.id}')">
        ${item.done?`<svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M2.5 7L5.5 10L11.5 4" stroke="#0a0a0a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`:''}
      </div>
      <span class="item-text" style="color:${item.done?'rgba(255,255,255,0.25)':'#fff'};${item.done?'text-decoration:line-through':''}">${item.title}</span>
      <div class="item-cat-dot" style="background:${c}"></div>
    </div>
  </div>`;
}

window.startHold = function(id,e){
  const el=document.getElementById('item-'+id);
  if(el)el.classList.add('pressing');
  holdTimer=setTimeout(()=>{openDeleteId=id;renderHome();},500);
};
window.endHold = function(){
  clearTimeout(holdTimer);
  document.querySelectorAll('.item.pressing').forEach(el=>el.classList.remove('pressing'));
};
window.cancelDelete = function(){openDeleteId=null;renderHome();};
window.deleteItem = function(id){removeItem(id);openDeleteId=null;};
window.setHomeCat = function(c){homeCat=c;openDeleteId=null;renderHome();};
window.onCheck = function(id){
  const item=items.find(x=>x.id===id);if(!item)return;
  if(!item.done) openDoneModal(item);
  else{ saveItem({...item,done:false}); }
};

function renderMem(){
  const memories=items.filter(x=>x.done);
  const f=memCat==='All'?memories:memories.filter(x=>x.cat===memCat);
  document.getElementById('mem-cats').innerHTML=CATS.map(c=>chipHTML(c,memCat===c,`setMemCat('${c}')`)).join('');
  document.getElementById('mode-label').textContent=memMode==='card'?'Board Mode':'Card Mode';
  const scrollArea=document.getElementById('mem-scroll-area');
  const va=document.getElementById('mem-view');
  if(f.length===0){
    scrollArea.style.overflow='hidden';
    va.style.cssText='height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center';
    va.innerHTML=`<div class="empty-state"><div class="empty-ic">✦</div><div class="empty-tx">No memories yet</div></div>`;
    return;
  }
  if(memMode==='card'){
    scrollArea.style.overflow='hidden';
    va.style.cssText='height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding-bottom:50px';
    va.innerHTML=`<div class="card-stack">${f.slice(0,3).map(m=>`
      <div class="polaroid" onclick="openMemDetail('${m.id}')">
        <div class="polaroid-img">${m.photos&&m.photos[0]?`<img src="${m.photos[0]}"/>`:`${memEmoji(m.cat)}`}</div>
        <div class="polaroid-title">${m.title}</div>
        <div class="polaroid-date">${m.date||'2026'}</div>
        <div class="polaroid-cat" style="background:${CC[m.cat]||'#fff'}">${m.cat}</div>
      </div>`).join('')}</div>
      <div class="stack-hint">${f.length} memories · tap to open</div>`;
  } else {
    scrollArea.style.overflow='auto';
    va.style.cssText='padding:4px 0 20px';
    va.innerHTML=`<div class="grid-view">${f.map(m=>`
      <div class="grid-card" onclick="openMemDetail('${m.id}')">
        <div class="grid-img">${m.photos&&m.photos[0]?`<img src="${m.photos[0]}"/>`:`${memEmoji(m.cat)}`}</div>
        <div class="grid-body"><div class="grid-title">${m.title}</div><div class="grid-date">${m.date||'2026'}</div></div>
      </div>`).join('')}</div>`;
  }
}

function memEmoji(cat){return{Travel:'⛩️',Food:'🍣',Fun:'🎤',Romance:'🌉',Adventure:'🌌',Other:'✨'}[cat]||'✨';}
window.toggleMode = function(){memMode=memMode==='card'?'grid':'card';renderMem();};
window.setMemCat = function(c){memCat=c;renderMem();};

function catPickerHTML(){
  return Object.entries(CC).map(([c,col])=>`<div class="cpick ${newCat===c?'sel':''}" style="background:${col}" onclick="pickCat('${c}')">${c}</div>`).join('');
}

function openAddModal(){
  document.getElementById('modal-container').innerHTML=`
    <div class="modal-overlay" id="mov">
      <div class="modal-sheet">
        <div class="drag-handle"></div>
        <div class="modal-title">new dream ✦</div>
        <input class="m3-input" id="ni" placeholder="what do you want to do together?"/>
        <div class="cat-row" id="cat-picker">${catPickerHTML()}</div>
        <div class="modal-btns">
          <button class="btn-filled" onclick="addItem()">Add to list +</button>
          <button class="btn-outlined" onclick="closeModal()">Cancel</button>
        </div>
      </div>
    </div>`;
  document.getElementById('ni').addEventListener('keydown',e=>{if(e.key==='Enter')addItem();});
  document.getElementById('mov').addEventListener('click',e=>{if(e.target.id==='mov')closeModal();});
  setTimeout(()=>document.getElementById('ni')?.focus(),50);
}

function openDoneModal(item){
  tempPhotos=[];
  document.getElementById('modal-container').innerHTML=`
    <div class="modal-overlay" id="mov">
      <div class="modal-sheet" style="position:relative">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <div class="modal-label">you did it! 🎉</div>
        <div class="modal-item-name">${item.title}</div>
        <div class="photo-grid" id="pgrid">${photoSlots()}</div>
        <input class="m3-input" id="note-in" placeholder="write a memory note..."/>
        <div class="modal-btns">
          <button class="btn-filled pink" onclick="confirmDone('${item.id}')">We've done it!</button>
          <button class="btn-outlined" onclick="closeModal()">Cancel</button>
        </div>
      </div>
    </div>`;
  document.getElementById('mov').addEventListener('click',e=>{if(e.target.id==='mov')closeModal();});
}

window.openMemDetail = function(id){
  const m=items.find(x=>x.id===id);if(!m)return;
  const c=CC[m.cat]||'#fff';
  const photos=m.photos||[];
  document.getElementById('modal-container').innerHTML=`
    <div class="modal-overlay" id="mov">
      <div class="modal-sheet" style="position:relative">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <span class="mem-cat-badge" style="background:${c}">${m.cat}</span>
        <div class="modal-title" style="margin-bottom:4px">${m.title}</div>
        <div style="font-size:11px;font-weight:700;color:rgba(255,255,255,0.3);margin-bottom:14px;text-transform:uppercase;letter-spacing:0.08em">${m.date||'2026'}</div>
        <div class="mem-photos">
          ${photos.length>0
            ? photos.map(p=>`<div class="mem-photo"><img src="${p}"/></div>`).join('')
            : [memEmoji(m.cat),'📸','📸','📸'].map(e=>`<div class="mem-photo">${e}</div>`).join('')}
        </div>
        ${m.note?`<div class="mem-note">${m.note}</div>`:''}
      </div>
    </div>`;
  document.getElementById('mov').addEventListener('click',e=>{if(e.target.id==='mov')closeModal();});
};

function photoSlots(){
  let h='';
  for(let i=0;i<4;i++){
    if(i<tempPhotos.length) h+=`<div class="photo-slot"><img src="${tempPhotos[i]}"/></div>`;
    else if(i===tempPhotos.length) h+=`<label class="photo-slot"><input type="file" accept="image/*" style="display:none" onchange="handlePhoto(this,${i})"><div class="plus-ic">+</div></label>`;
    else h+=`<div class="photo-slot"></div>`;
  }
  return h;
}

window.handlePhoto = function(input,idx){
  const file=input.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{tempPhotos[idx]=e.target.result;document.getElementById('pgrid').innerHTML=photoSlots();};
  r.readAsDataURL(file);
};

window.confirmDone = function(id){
  const item=items.find(x=>x.id===id);if(!item)return;
  const note=document.getElementById('note-in')?.value||'';
  const date=new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  saveItem({...item, done:true, photos:[...tempPhotos], note, date});
  closeModal();
};

window.pickCat = function(c){
  newCat=c;
  const p=document.getElementById('cat-picker');
  if(p) p.innerHTML=catPickerHTML();
};

window.addItem = function(){
  const t=document.getElementById('ni')?.value.trim();if(!t)return;
  newItem({title:t, cat:newCat, done:false, photos:[], note:'', date:''});
  closeModal();
};

window.closeModal = function(){document.getElementById('modal-container').innerHTML='';};
</script>
</body>
</html>
